                    </div>
                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm px-2 py-1">
                        ${generateStaticLewisHTML(currentScenario)}
                    </div>
                    ${getLewisExplanationHTML(currentScenario)}
                </div>
            `;
        }

        function getBentAngleCategory(formula) {
            const f = formula || '';
            if (['H2O', 'H2S', 'OF2', 'OCl2', 'SF2', 'SCl2'].includes(f)) return 'angular_ax2e2';
            if (['CO2', 'CS2'].includes(f)) return 'linear_ax2';
            if (['PH3', 'PCl3', 'PF3', 'PBr3', 'PI3', 'NH3', 'NF3', 'NCl3', 'NBr3', 'NI3'].includes(f)) return 'trigonal_pyramidal_ax3e1';
            return 'angular_ax2e1';
        }

        function getRealBondAngleText(formula, geometry, defaultText) {
            if (geometry === 'angular') return '≈ 104.5°';
            return defaultText;
        }

        function renderMolecularGeometryOnStage(showDipoles = false) {
            const data = getMolecularGeometryData();
            if (!data || !currentScenario || !currentScenario.builder || !stageContent) return;

            const b = currentScenario.builder;
            const bondOrder = b.expectedBondLevel || 1;
            const lpCenter = b.expectedLp?.center || 0;
            const lpPeriph = b.expectedLp?.periph || [];

            const W = 460;
            const H = 340;
            const cx = 230;
            const cy = 170;
            const r = 118;

            function positionsForGeometry() {
                if (data.isDiatomic) {
                    return [{ sym: b.center, x: 160, y: cy, pos: 'center' }, { sym: b.periph[0], x: 300, y: cy, pos: 0 }];
                }
                if (data.geometry === 'linear') {
                    return [
                        { sym: b.center, x: cx, y: cy, pos: 'center' },
                        { sym: b.periph[0], x: cx - r, y: cy, pos: 0 },
                        { sym: b.periph[1], x: cx + r, y: cy, pos: 1 }
                    ].filter(a => a.sym);
                }
                if (data.geometry === 'angular') {
                    const angleCategory = getBentAngleCategory(currentScenario.form);
                    const angle = 104.5;
                    const half = angle / 2;
                    const a1 = (270 - half) * Math.PI / 180;
                    const a2 = (270 + half) * Math.PI / 180;
                    return [
                        { sym: b.center, x: cx, y: cy - 22, pos: 'center' },
                        { sym: b.periph[0], x: cx + r * Math.cos(a1), y: cy - 22 + r * Math.sin(a1), pos: 0 },
                        { sym: b.periph[1], x: cx + r * Math.cos(a2), y: cy - 22 + r * Math.sin(a2), pos: 1 }
                    ].filter(a => a.sym);
                }
                if (data.geometry === 'plano_triangular') {
                    const angs = [-90, 150, 30];
                    return [{ sym: b.center, x: cx, y: cy, pos: 'center' }, ...b.periph.map((sym, i) => {
                        const a = angs[i] * Math.PI / 180;
                        return { sym, x: cx + r * Math.cos(a), y: cy + r * Math.sin(a), pos: i };
                    })];
                }
                if (data.geometry === 'piramide_triangular') {
                    return [
                        { sym: b.center, x: cx, y: 86, pos: 'center' },
                        { sym: b.periph[0], x: cx - 114, y: 170, pos: 0 },
                        { sym: b.periph[1], x: cx - 42, y: 232, pos: 1 },
                        { sym: b.periph[2], x: cx + 126, y: 166, pos: 2 }
                    ].filter(a => a.sym);
                }
                if (data.geometry === 'tetraedrica') {
                    return [
                        { sym: b.center, x: cx, y: cy - 8, pos: 'center' },
                        { sym: b.periph[0], x: cx, y: cy - 128, pos: 0 },
                        { sym: b.periph[1], x: cx - 124, y: cy + 50, pos: 1 },
                        { sym: b.periph[2], x: cx + 122, y: cy + 36, pos: 2 },
                        { sym: b.periph[3], x: cx + 18, y: cy + 132, pos: 3 }
                    ].filter(a => a.sym);
                }
                return [{ sym: b.center, x: cx, y: cy, pos: 'center' }];
            }

            const pts = positionsForGeometry();
            const centerPt = pts.find(p => p.pos === 'center') || pts[0];
            const periphPts = pts.filter(p => p.pos !== 'center');

            function getBondVisualStyle(posIndex) {
                if (data.geometry === 'piramide_triangular') {
                    if (posIndex === 0) return 'hashed';
                    if (posIndex === 1) return 'wedge';
                    return 'plain';
                }
                if (data.geometry === 'tetraedrica') {
                    if (posIndex === 1) return 'hashed';
                    if (posIndex === 3) return 'wedge';
                    return 'plain';
                }
                return 'plain';
            }

            function bondSvgStyle(x1, y1, x2, y2, order, style) {
                const dx = x2 - x1;
                const dy = y2 - y1;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                const ux = dx / len;
                const uy = dy / len;
                const nx = -uy;
                const ny = ux;
                const startPad = 28;
                const endPad = 30;
                const sx = x1 + ux * startPad;
                const sy = y1 + uy * startPad;
                const ex = x2 - ux * endPad;
                const ey = y2 - uy * endPad;
                if (order > 1 || style === 'plain') {
                    const gap = 5;
                    const offsets = order === 1 ? [0] : (order === 2 ? [-gap, gap] : [-gap * 1.4, 0, gap * 1.4]);
                    return offsets.map(o => `<line x1="${sx + nx * o}" y1="${sy + ny * o}" x2="${ex + nx * o}" y2="${ey + ny * o}" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>`).join('');
                }
                if (style === 'wedge') {
                    const startHalf = 2.2;
                    const endHalf = 9.2;
                    return `<polygon points="${sx + nx * startHalf},${sy + ny * startHalf} ${sx - nx * startHalf},${sy - ny * startHalf} ${ex - nx * endHalf},${ey - ny * endHalf} ${ex + nx * endHalf},${ey + ny * endHalf}" fill="#111827" opacity="0.96"/>`;
                }
                if (style === 'hashed') {
                    const segs = 8;
                    let pieces = '';
                    for (let i = 0; i < segs; i++) {
                        const t = (i + 1) / (segs + 1);
                        const px = sx + (ex - sx) * t;
                        const py = sy + (ey - sy) * t;
                        const half = 1.0 + t * 8.0;
                        pieces += `<line x1="${px - nx * half}" y1="${py - ny * half}" x2="${px + nx * half}" y2="${py + ny * half}" stroke="#111827" stroke-width="1.5" stroke-linecap="round" opacity="0.95"/>`;
                    }
                    return pieces;
                }
                return '';
            }

            function lonePairMark(x, y, angleDeg = 0) {
                return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" fill="#dc2626" stroke="#ffffff" stroke-width="2.6" paint-order="stroke" font-size="22" font-weight="900" transform="rotate(${angleDeg} ${x} ${y})">··</text>`;
            }

            function lpSvg(x, y, count, pos, refX = null, refY = null) {
                if (!count) return '';
                const marks = [];
                if (pos === 'center' || refX === null || refY === null) {
                    const configs = [
                        { ang: -90, r: 50 },
                        { ang: 0, r: 48 },
                        { ang: 90, r: 48 },
                        { ang: 180, r: 48 }
                    ];
                    configs.slice(0, count).forEach(cfg => {
                        const rad = cfg.ang * Math.PI / 180;
                        const px = x + cfg.r * Math.cos(rad);
                        const py = and + cfg.r * Math.sin(rad);
                        marks.push(lonePairMark(px, py, cfg.ang + 90));
                    });
                    return marks.join('');
                }

                // Lone pairs de atoms extremos: pegados al atom and orientados
                // around del contorno, evitando el lado del bond.
                const outward = Math.atan2(y - refY, x - refX);
                let relDegs = [];
                if (count === 1) relDegs = [0];
                else if (count === 2) relDegs = [-44, 44];
                else relDegs = [-56, 0, 56];

                // Radio menor so that queden adosados al atom extremo.
                // El atom has r≈27; 33-36 px deja el par justo fuera del borde.
                const lpRadius = count >= 3 ? 35 : 34;

                relDegs.slice(0, count).forEach(d => {
                    const ang = outward + d * Math.PI / 180;
                    const px = x + lpRadius * Math.cos(ang);
                    const py = and + lpRadius * Math.sin(ang);
                    marks.push(lonePairMark(px, py, ang * 180 / Math.PI + 90));
                });
                return marks.join('');
            }

            function dipoleArrowSvg(centerSym, periphSym, x1, y1, x2, y2) {
                if (!showDipoles || !isBondConsideredPolar(centerSym, periphSym)) return '';
                const dx = x2 - x1;
                const dy = y2 - y1;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                let startX, startY, endX, endY;

                // En PH3 la diferencia de electronegatividad P-H es mínima and dipolo de bond
                // debe representarse como muy weak: flecha corta and fina.
                if (currentScenario.form === 'PH3') {
                    const ux = dx / len;
                    const uy = dy / len;
                    const midX = (x1 + x2) / 2;
                    const midY = (y1 + y2) / 2;
                    const arrowLen = 18;
                    const towardPeriph = getBondDipoleSense(centerSym, periphSym) === 'A_to_B';
                    startX = midX - ux * arrowLen / 2;
                    startY = midY - uy * arrowLen / 2;
                    endX = midX + ux * arrowLen / 2;
                    endY = midY + uy * arrowLen / 2;
                    if (!towardPeriph) {
                        const tx = startX, ty = startY;
                        startX = endX; startY = endY;
                        endX = tx; endY = ty;
                    }
                    return `<line x1="${startX}" y1="${startY}" x2="${endX}" y2="${endY}" stroke="#0f766e" stroke-width="1.6" marker-end="url(#dipoleArrow)" stroke-linecap="round"/>`;
                }

                if (getBondDipoleSense(centerSym, periphSym) === 'A_to_B') {
                    startX = x1 + dx / len * 46;
                    startY = y1 + dy / len * 46;
                    endX = x2 - dx / len * 46;
                    endY = y2 - dy / len * 46;
                } else {
                    startX = x2 - dx / len * 46;
                    startY = y2 - dy / len * 46;
                    endX = x1 + dx / len * 46;
                    endY = y1 + dy / len * 46;
                }
                return `<line x1="${startX}" y1="${startY}" x2="${endX}" y2="${endY}" stroke="#0f766e" stroke-width="2.3" marker-end="url(#dipoleArrow)" stroke-linecap="round"/>`;
            }

            function getAngleMarkup() {
                if (periphPts.length < 2) return { arc: '', label: '' };
                let pA = periphPts[0], pB = periphPts[1], radius = 42;
                if (data.geometry === 'plano_triangular') { pA = periphPts[1] || periphPts[0]; pB = periphPts[2] || periphPts[1]; radius = 38; }
                else if (data.geometry === 'angular') { pA = periphPts[0]; pB = periphPts[1]; radius = 36; }
                else if (data.geometry === 'piramide_triangular') { pA = periphPts[1]; pB = periphPts[2]; radius = 32; }
                else if (data.geometry === 'tetraedrica') { pA = periphPts[0]; pB = periphPts[2] || periphPts[1]; radius = 32; }
                else if (data.geometry === 'linear') { pA = periphPts[0]; pB = periphPts[1]; radius = 34; }
                function angleFromCenter(pt) { return Math.atan2(pt.y - centerPt.y, pt.x - centerPt.x); }
                let a1 = angleFromCenter(pA), a2 = angleFromCenter(pB), delta = a2 - a1;
                while (delta <= -Math.PI) delta += 2 * Math.PI;
                while (delta > Math.PI) delta -= 2 * Math.PI;
                let start = a1, end = a2;
                if (Math.abs(delta) > Math.PI) { if (delta > 0) start = a2, end = a1; else start = a1, end = a2; }
                else if (delta < 0) { start = a2; end = a1; }
                let finalDelta = end - start;
                while (finalDelta < 0) finalDelta += 2 * Math.PI;
                if (finalDelta > Math.PI) { const tmp = start; start = end; end = tmp + 2 * Math.PI; finalDelta = end - start; }
                const x1 = centerPt.x + radius * Math.cos(start);
                const y1 = centerPt.y + radius * Math.sin(start);
                const x2 = centerPt.x + radius * Math.cos(end);
                const y2 = centerPt.y + radius * Math.sin(end);
                const arc = `<path d="M ${x1} ${y1} A ${radius} ${radius} 0 0 1 ${x2} ${y2}" fill="none" stroke="#f59e0b" stroke-width="3.2" stroke-linecap="round"/>`;
                const labelText = getRealBondAngleText(currentScenario.form, data.geometry, data.angleText).replace('≈ ', '').replace('< ', '<');
                const mid = start + finalDelta / 2;
                const labelRadius = radius + 48;
                const lx = centerPt.x + labelRadius * Math.cos(mid);
                const ly = centerPt.y + labelRadius * Math.sin(mid);
                const label = `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="#d97706" stroke="#ffffff" stroke-width="3" paint-order="stroke" font-size="22" font-weight="900">${labelText}</text>`;
                return { arc, label };
            }

            const bonds = periphPts.map((p, i) => bondSvgStyle(centerPt.x, centerPt.y, p.x, p.y, bondOrder, getBondVisualStyle(p.pos))).join('');
            const bondDipoles = periphPts.map((p, i) => dipoleArrowSvg(b.center, b.periph[i], centerPt.x, centerPt.y, p.x, p.y)).join('');
            const atomSvg = pts.map(p => `<g><circle cx="${p.x}" cy="${p.y}" r="27" fill="${p.pos === 'center' ? '#e0e7ff' : '#f8fafc'}" stroke="${p.pos === 'center' ? '#6366f1' : '#94a3b8'}" stroke-width="3"/><text x="${p.x}" y="${p.y + 1}" text-anchor="middle" dominant-baseline="middle" fill="#0f172a" font-size="22" font-weight="800">${p.sym}</text></g>`).join('');
            const lonePairs = lpSvg(centerPt.x, centerPt.y, lpCenter, 'center') + periphPts.map((p, i) => lpSvg(p.x, p.y, lpPeriph[i] || 0, i, centerPt.x, centerPt.y)).join('');
            const angleMarkup = getAngleMarkup();

            let netDipoleSvg = '';
            if (showDipoles && data.moleculePolar) {
                let startX = centerPt.x, startY = centerPt.y, endX = centerPt.x, endY = centerPt.y, labelX = centerPt.x, labelY = centerPt.y;
                if (data.geometry === 'piramide_triangular') {
                    const netLen = currentScenario.form === 'PH3' ? 42 : 98;
                    startX = centerPt.x;
                    startY = centerPt.y + 8;
                    endX = centerPt.x;
                    endY = centerPt.y + netLen;
                    labelX = endX + 18;
                    labelY = endY + 10;
                } else {
                    let sumX = 0, sumY = 0;
                    periphPts.forEach((p, i) => {
                        const sym = b.periph[i];
                        if (!isBondConsideredPolar(b.center, sym)) return;
                        const dx = p.x - centerPt.x;
                        const dy = p.y - centerPt.y;
                        const len = Math.sqrt(dx * dx + dy * dy) || 1;
                        const towardPeriph = getBondDipoleSense(b.center, sym) === 'A_to_B';
                        const weight = Math.max(Math.abs((electronegativityDB[b.center] || 0) - (electronegativityDB[sym] || 0)), 0.20);
                        sumX += (towardPeriph ? dx / len : -dx / len) * weight;
                        sumY += (towardPeriph ? dy / len : -dy / len) * weight;
                    });
                    const mag = Math.sqrt(sumX * sumX + sumY * sumY) || 1;
                    const ux = sumX / mag;
                    const uy = sumY / mag;
                    endX = centerPt.x + ux * 72;
                    endY = centerPt.y + uy * 72;
                    labelX = endX + ux * 22;
                    labelY = endY + uy * 22;
                }
                const netStrokeWidth = currentScenario.form === 'PH3' ? 2.0 : 2.8;
                const netFontSize = currentScenario.form === 'PH3' ? 17 : 20;
                netDipoleSvg = `<line x1="${startX}" y1="${startY}" x2="${endX}" y2="${endY}" stroke="#7c3aed" stroke-width="${netStrokeWidth}" marker-end="url(#netDipoleArrow)" stroke-linecap="round"/><text x="${labelX}" y="${labelY}" text-anchor="middle" dominant-baseline="middle" fill="#7c3aed" stroke="#ffffff" stroke-width="3" paint-order="stroke" font-size="${netFontSize}" font-weight="900">μ</text>`;
            }

            const shapeLabels = { linear: 'Linear', angular: 'Bent', plano_triangular: 'Trigonal planar', piramide_triangular: 'Trigonal pyramidal', tetraedrica: 'Tetrahedral' };
            const displayAngleText = getRealBondAngleText(currentScenario.form, data.geometry, data.angleText);
            const displayShapeLabel = data.geometry === 'angular'
                ? (getBentAngleCategory(currentScenario.form) === 'angular_ax2e2' ? 'Bent AX₂E₂' : 'Bent AX₂E₁')
                : shapeLabels[data.geometry];
            stageContent.innerHTML = `<div class="fade-in w-full flex flex-col items-center justify-center"><div class="mb-1 text-center"><div class="text-sm font-bold text-slate-500 uppercase tracking-wide">Structure Geometry</div><div class="text-2xl font-extrabold text-indigo-700">${formatChemicalFormulaHTML(currentScenario.form)}</div></div><div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-3"><svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width: 420px; height: auto; max-height: 300px;"><defs><marker id="dipoleArrow" markerWidth="5.2" markerHeight="5.2" refX="4.8" refY="2.6" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L5.2,2.6 L0,5.2 z" fill="#0f766e"></path></marker><marker id="netDipoleArrow" markerWidth="4.4" markerHeight="4.4" refX="4.0" refY="2.2" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L4.4,2.2 L0,4.4 z" fill="#7c3aed"></path></marker></defs>${bonds}${angleMarkup.arc}${bondDipoles}${netDipoleSvg}${atomSvg}${lonePairs}${angleMarkup.label}</svg></div><div class="mt-1.5 text-sm text-slate-700 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-center"><b>${displayShapeLabel}</b> · angle ${displayAngleText}${showDipoles ? '<br><span class="text-teal-700">Teal arrows: bond dipole moments</span>' : ''}${showDipoles && data.moleculePolar ? '<br><span class="text-violet-700 font-bold">Violet arrow: molecular dipole moment</span>' : ''}</div></div>`;
        }

        // --- CÁLCULO DE MASA ATÓMICA O MOLECULAR ---
        function stepMassCalculation(c1, c2, isRetry = false, prevMass = '', prevUnit = '') {
            if (!isRetry) currentStepAttempts = 0;
            const a1 = elementsDB[currentScenario.e1];
            const a2 = elementsDB[currentScenario.e2];
            const isIonic = currentScenario.type === 'ionic';
            const isHomo = currentScenario.e1 === currentScenario.e2;
            const isNone = currentScenario.type === 'none';
            const isMetallic = currentScenario.type === 'metallic';
            const isCovalentAtomic = currentScenario.type === 'covalent_atomic';
            
            let massName = 'molecular mass (<i>M</i><sub>r</sub>)';
            if (isIonic || (isCovalentAtomic && !isHomo)) massName = 'mass de la formula (<i>M</i><sub>r</sub>)';
            else if (isNone || isMetallic || (isCovalentAtomic && isHomo)) massName = 'atomic mass (<i>A</i><sub>r</sub>)';

            safeSetTimeout(() => {
                if (!isRetry) {
                    if (isHomo && !isCovalentAtomic) {
                        addTutorMessage(`Now let us calculate the <b>${massName}</b>. Knowing that the atomic mass of ${a1.sym} es ${a1.mass.toFixed(2)} u.<br><br>What is the total mass of the formula and which unit is used?`);
                    } else if (isCovalentAtomic && isHomo) {
                        addTutorMessage(`Now let us calculate the <b>${massName}</b>. Knowing that the atomic mass of ${a1.sym} es ${a1.mass.toFixed(2)} u.<br><br>What is the atomic mass of the element in the lattice and which unit is used?`);
                    } else {
                        addTutorMessage(`Now let us calculate the <b>${massName}</b>. Knowing that las atomic masses son:<br>• ${a1.sym}: ${a1.mass.toFixed(2)} u<br>• ${a2.sym}: ${a2.mass.toFixed(2)} u<br><br>What is the total mass of the formula and which unit is used?`);
                    }
                }

                inputArea.innerHTML = `
                    <div class="flex flex-col space-y-1 fade-in font-sans text-slate-800">
                        <div class="flex items-center justify-center space-x-2">
                            <input type="text" id="calcMass" value="${prevMass}" placeholder="Ej: 45.02" class="border border-slate-300 rounded p-1.5 w-24 text-center focus:ring-2 outline-none bg-white text-slate-800">
                            <input type="text" id="calcUnit" value="${prevUnit}" placeholder="Unit" class="border border-slate-300 rounded p-1.5 w-20 text-center focus:ring-2 outline-none bg-white text-slate-800">
                        </div>
                        <button onclick="checkMass(${c1}, ${c2})" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-1.5 rounded transition-colors font-sans">Check Mass and Unit</button>
                    </div>
                `;
            }, isRetry ? 100 : 1500);
        }

        function checkMass(c1, c2) {
            const userMassRaw = document.getElementById('calcMass').value.trim();
            const userUnitRaw = document.getElementById('calcUnit').value.trim();

            if (!userMassRaw || !userUnitRaw) {
                addTutorMessage("Please fill in both the mass box and the unit box before checkinging.");
                return;
            }

            currentStepAttempts++;
            
            const userMass = parseFloat(userMassRaw.replace(',', '.')); 
            const userUnit = userUnitRaw; 

            const a1 = elementsDB[currentScenario.e1];
            const a2_sym = currentScenario.e2;
            const a2 = elementsDB[a2_sym];
            const expectedMass = (c1 * a1.mass + (c2 ? c2 * a2.mass : 0)).toFixed(2);
            
            const isMassCorrect = !isNaN(userMass) && Math.abs(userMass - parseFloat(expectedMass)) < 0.05;
            const isUnitCorrect = userUnit === 'u'; 

            inputArea.innerHTML = '';
            addUserMessage(`${userMassRaw} ${userUnitRaw}`);

            safeSetTimeout(() => {
                if (isMassCorrect && isUnitCorrect) {
                    addTutorMessage(`<b class="text-red-600 font-bold">Perfect!</b> La mass is correct: <b class="text-red-600 font-bold">${expectedMass.replace('.', ',')} u</b>.`);
                    stepMicroscopicStructure();
                } else {
                    if (currentStepAttempts >= 3) {
                        addTutorMessage(`You have used all 3 attempts. The correct mass is <b class="text-red-600 font-bold">${expectedMass.replace('.', ',')} u</b>.`);
                        safeSetTimeout(() => stepMicroscopicStructure(), 2500);
                    } else {
                        let errorMsg = "Mmm, review the answer. ";
                        
                        if (!isUnitCorrect && isMassCorrect) {
                            if (userUnit.toLowerCase() === 'u') {
                                errorMsg += `The numerical value is correct, but <b class="text-amber-600 font-bold">be careful with notation!</b> The official symbol for the atomic mass unit must not be written with arbitrary capitalization.`;
                            } else {
                                errorMsg += `The numerical value is correct, but there is an <b class="text-amber-600 font-bold">error in the unit</b>. Check the official international symbol (de una sola letra en lowercase) para la unit de atomic mass unificada. No se admiten abreviaturas antiguas ni otras units.`;
                            }
                        } else if (!isMassCorrect && isUnitCorrect) {
                            if (currentStepAttempts === 1) {
                                errorMsg += `There is an error in <b>numerical value of the mass</b>. Think about it a little more and try again!`;
                            } else {
                                const isHomo = currentScenario.e1 === currentScenario.e2;
                                const isCovalentAtomic = currentScenario.type === 'covalent_atomic';
                                if (isHomo || (isCovalentAtomic && isHomo)) {
                                    let totalCount = c1 + (c2 || 0);
                                    let cText = totalCount === 1 ? "once" : `${totalCount} times`;
                                    errorMsg += `There is a numerical error. Suma ${cText} the mass of ${a1.sym}. `;
                                } else {
                                    let c1Text = c1 === 1 ? "once" : `${c1} times`;
                                    let c2Text = c2 === 1 ? "once" : `${c2} times`;
                                    errorMsg += `There is a numerical error. Suma ${c1Text} the mass of ${a1.sym} and ${c2Text} that of ${a2.sym}. `;
                                }
                            }
                        } else {
                            if (currentStepAttempts === 1) {
                                errorMsg += `There are errors in both the <b>numerical value</b> and the <b>unit</b>. Review both!`;
                            } else {
                                const isHomo = currentScenario.e1 === currentScenario.e2;
                                const isCovalentAtomic = currentScenario.type === 'covalent_atomic';
                                if (isHomo || (isCovalentAtomic && isHomo)) {
                                    let totalCount = c1 + (c2 || 0);
                                    let cText = totalCount === 1 ? "once" : `${totalCount} times`;
                                    errorMsg += `Calculate it by adding the mass of ${a1.sym} ${cText}. Also, use the official one-letter lowercase symbol for the unit.`;
                                } else {
                                    let c1Text = c1 === 1 ? "once" : `${c1} times`;
                                    let c2Text = c2 === 1 ? "once" : `${c2} times`;
                                    errorMsg += `Calculate it by adding the mass of ${a1.sym} ${c1Text} and the mass of ${a2.sym} ${c2Text}. Also, use the official one-letter lowercase symbol for the unit.`;
                                }
                            }
                        }
                        
                        addTutorMessage(errorMsg);
                        stepMassCalculation(c1, c2, true, userMassRaw, userUnitRaw); 
                    }
                }
            }, 800);
        }

        // --- ESTRUCTURA MICROSCÓPICA ---
        function stepMicroscopicStructure(isRetry = false) {
            if (!isRetry) currentStepAttempts = 0;
            safeSetTimeout(() => {
                if (!isRetry) {
                    addTutorMessage("Choose the type of <b>microscopic structure</b> this substance will form:");
                }
                
                inputArea.innerHTML = `
                    <div class="flex flex-col space-y-1 fade-in font-sans text-slate-800">

                            <option value="atomos_free">Free atoms</option>
                            <option value="lattice_metalica">Crystal lattice of cations with delocalized e⁻</option>
                            <option value="lattice_ions">Crystal lattice of ions</option>
                            <option value="lattice_atomos">Crystal lattice of neutral atoms</option>
                            <option value="moleculas">Molecules</option>
                        </select>
                        <button onclick="checkMicroscopicStructure()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-1.5 rounded transition-colors font-sans">Check Structure</button>
                    </div>
                `;
            }, isRetry ? 100 : 1000);
        }

        function checkMicroscopicStructure() {
            currentStepAttempts++;
            const selectEl = document.getElementById('microStructure');
            const userChoice = selectEl.value;
            const choiceText = selectEl.options[selectEl.selectedIndex]?.text || '';
            
            if(!userChoice) {
                addTutorMessage("Please select an option from the drop-down menu.");
                return;
            }

            inputArea.innerHTML = '';
            addUserMessage(choiceText);

            let expectedChoice = '';
            if (currentScenario.type === 'ionic') expectedChoice = 'lattice_ions';
            else if (currentScenario.type === 'metallic') expectedChoice = 'lattice_metalica';
            else if (currentScenario.type === 'none') expectedChoice = 'atomos_free';
            else if (currentScenario.type === 'covalent_atomic') expectedChoice = 'lattice_atomos';
            else expectedChoice = 'moleculas';

            safeSetTimeout(() => {
                if (userChoice === expectedChoice) {
                    addTutorMessage(`<b class="text-red-600 font-bold">Excellent!</b> You have identified the microscopic structure. Now we will see it as a <b>CPK 3D model at room temperature</b>.`);
                    showContinueButton('stepMicroscopic3DModel()', 'Ver modelo 3D');
                } else {
                    if (currentStepAttempts >= 3) {
                        const expectedTextMap = {
                            'lattice_ions': 'Crystal lattice of ions',
                            'moleculas': 'Molecules',
                            'lattice_metalica': 'Crystal lattice of cations with delocalized e⁻',
                            'atomos_free': 'Free atoms',
                            'lattice_atomos': 'Crystal lattice of neutral atoms'
                        };
                        addTutorMessage(`You have used all 3 attempts. La structure correcta es: <b class="text-red-600 font-bold">${expectedTextMap[expectedChoice]}</b>. Vamos a verla in modelo 3D CPK.`);
                        safeSetTimeout(() => stepMicroscopic3DModel(), 1600);
                    } else {
                        let hint = "";
                        if (currentStepAttempts === 1) {
                            hint = "That is not the correct structure. Think about how the particles of this type of substance interact based on the bonds we have just deduced.";
                        } else {
                            if (currentScenario.type === 'none') hint = "Remember: noble gases do not bond to anything, so think about how their particles would be found freely in space.";
                            else if (currentScenario.type === 'metallic') hint = "Remember: metals form solid crystal lattices made of cations immersed in a sea of shared electrons.";
                            else if (currentScenario.type === 'ionic') hint = "Remember: ionic compounds form large, solid, ordered structures of positive and negative charges.";
                            else if (currentScenario.type === 'covalent_atomic') hint = "Remember: El diamond and cuarzo son solids covalent que forman lattices crystalline gigantes donde todos the atoms están bonded por fortísimos covalent bonds.";
                            else hint = "Remember: La gran mayoría de las substances covalent sencillas forman pequeños groups aislados de atoms bonded entre sí.";
                        }
                        addTutorMessage(`Not exactly. ${hint}`);
                        stepMicroscopicStructure(true); 
                    }
                }
            }, 800);
        }


        // --- MICROSCOPIC 3D MODEL AT ROOM TEMPERATURE ---

        function renderCovalentMolecularMicroModel(formulaHtml) {
            const b = currentScenario.builder;
            const data = typeof getMolecularGeometryData === 'function' ? getMolecularGeometryData() : null;
            const center = b?.center || currentScenario.e1;
            const firstPeriph = b?.periph?.[0] || currentScenario.e2 || currentScenario.e1;
            let mol1 = '', mol2 = '', mol3 = '';
            if (data?.isDiatomic) {
                mol1 = simpleDiatomicMoleculeSVG(135, 105, center, firstPeriph, 'micro3d-float-a');
                mol2 = simpleDiatomicMoleculeSVG(345, 92, center, firstPeriph, 'micro3d-float-b');
                mol3 = simpleDiatomicMoleculeSVG(260, 202, center, firstPeriph, 'micro3d-float-c');
            } else if (data?.geometry === 'tetraedrica') {
                mol1 = simpleTetraMoleculeSVG(145, 115, center, firstPeriph, 'micro3d-float-a micro3d-rotate');
                mol2 = simpleTetraMoleculeSVG(350, 112, center, firstPeriph, 'micro3d-float-b micro3d-rotate');
                mol3 = simpleTetraMoleculeSVG(250, 200, center, firstPeriph, 'micro3d-float-c micro3d-rotate');
            } else if (data?.geometry === 'piramide_triangular') {
                mol1 = simplePyramidMoleculeSVG(150, 86, center, firstPeriph, 'micro3d-float-a micro3d-rotate');
                mol2 = simplePyramidMoleculeSVG(350, 88, center, firstPeriph, 'micro3d-float-b micro3d-rotate');
                mol3 = simplePyramidMoleculeSVG(250, 178, center, firstPeriph, 'micro3d-float-c micro3d-rotate');
            } else if (data?.geometry === 'angular') {
                mol1 = simpleBentMoleculeSVG(140, 86, center, firstPeriph, 'micro3d-float-a micro3d-rotate');
                mol2 = simpleBentMoleculeSVG(360, 88, center, firstPeriph, 'micro3d-float-b micro3d-rotate');
                mol3 = simpleBentMoleculeSVG(250, 180, center, firstPeriph, 'micro3d-float-c micro3d-rotate');
            } else if (data?.geometry === 'linear' && (b?.periph?.length || 0) >= 2) {
                mol1 = simpleLinearTriatomicSVG(145, 105, center, firstPeriph, 'micro3d-float-a micro3d-rotate');
                mol2 = simpleLinearTriatomicSVG(355, 92, center, firstPeriph, 'micro3d-float-b micro3d-rotate');
                mol3 = simpleLinearTriatomicSVG(260, 200, center, firstPeriph, 'micro3d-float-c micro3d-rotate');
            } else {
                mol1 = simpleDiatomicMoleculeSVG(135, 105, center, firstPeriph, 'micro3d-float-a');

            return `

                    </svg>

        function renderDiamondMicroModel(formulaHtml) {

        function renderSiO2MicroModel(formulaHtml) {
            const si = [[165,115],[260,180],[355,115]];
            const o = [[165,55],[105,145],[220,145],[260,115],[315,145],[415,145],[355,55],[260,245]];

            const siAtoms = si.map(([x,y]) => atomCircleSVG(x,y,18,'Si',"#dbeafe","#2563eb","micro3d-vibrate")).join('');

        function renderMicroscopic3DModelOnStage() {
            const formulaHtml = formatChemicalFormulaHTML(currentScenario.form || currentScenario.e1 || '');
            let html = '';
            if (currentScenario.type === 'none') html = renderNobleGasMicroModel(currentScenario.e1, formulaHtml);
            else if (currentScenario.type === 'covalent') html = renderCovalentMolecularMicroModel(formulaHtml);
            else if (currentScenario.type === 'ionic') html = renderIonicMicroModel(formulaHtml);
            else if (currentScenario.type === 'metallic') html = renderMetallicMicroModel(formulaHtml);
            else if (currentScenario.type === 'covalent_atomic') {
                if ((currentScenario.form || '').toLowerCase().includes('sio2') || (currentScenario.e1 === 'Si' && currentScenario.e2 === 'O')) html = renderSiO2MicroModel(formulaHtml);
                else html = renderDiamondMicroModel(formulaHtml);
            }
            stageContent.innerHTML = html + `<div class="mt-1 text-[12px] text-slate-500 text-center max-w-md mx-auto">Didactic representation: it shows the type of structure and microscopic motion, not an exact crystal unit cell.</div>`;

        function disposeMicro3DScene() {
            if (window.__micro3dAnimationId) cancelAnimationFrame(window.__micro3dAnimationId);
            window.__micro3dAnimationId = null;
            if (window.__micro3dRenderer) {
                try { window.__micro3dRenderer.dispose(); } catch(e) {}
                window.__micro3dRenderer = null;
            }
            window.__micro3dSceneState = null;
        }

        function getMicro3DUnitLewisHTML() {
            if (!currentScenario || currentScenario.type !== 'covalent_atomic' || !currentScenario.builder) return '';
            let title = 'Local unit / Lewis connectivity type';
            if ((currentScenario.form || '') === 'C' || (currentScenario.e1 === 'C' && (!currentScenario.e2 || currentScenario.e2 === 'C'))) {
                title = 'Unit cell / local diamond connectivity';
            } else if ((currentScenario.form || '').toLowerCase().includes('sio2')) {
                title = 'Local unit in the SiO₂ network';
            }
            return `<div class="micro3d-unit-lewis"><div class="micro3d-unit-lewis-title">${title}</div>${generateStaticLewisHTML(currentScenario)}</div>`;
        }

        function isDiamond3DScenario() {
            return currentScenario && currentScenario.type === 'covalent_atomic' && ((currentScenario.form || '') === 'C' || ((currentScenario.e1 === 'C') && (!currentScenario.e2 || currentScenario.e2 === 'C')));
        }

        function isSiO2NetworkScenario() {
            return currentScenario && currentScenario.type === 'covalent_atomic' && ((currentScenario.form || '') === 'SiO2');
        }

        function isSiCNetworkScenario() {
            return currentScenario && currentScenario.type === 'covalent_atomic' && ((currentScenario.form || '') === 'SiC');
        }

        function isC3N4NetworkScenario() {
            return currentScenario && currentScenario.type === 'covalent_atomic' && ((currentScenario.form || '') === 'C3N4');
        }

        function renderMicroscopic3DThreeStage() {
            disposeMicro3DScene();
            const formulaHtml = formatChemicalFormulaHTML(currentScenario.form || currentScenario.e1 || '');
            let label = '3D microscopic model';
            if (currentScenario.type === 'ionic') label = 'three-dimensional ionic lattice';
            else if (currentScenario.type === 'metallic') label = 'cation lattice with a sea of e⁻';
            else if (currentScenario.type === 'covalent_atomic') label = 'three-dimensional covalent network';
            else if (currentScenario.type === 'covalent') label = 'independent molecules in 3D';
            else if (currentScenario.type === 'none') label = 'isolated atoms in motion';

            stageContent.innerHTML = `
                <div class="micro3d-three-card fade-in ${isDiamond3DScenario() ? 'micro3d-diamond-compact' : ''}">
                    <div class="micro3d-three-title">${getMicro3DHeaderText()}</div>
                    <div class="micro3d-three-subtitle">${getMicro3DSubtitleText()}</div>
                    <div id="micro3d-three-container" style="height:${isDiamond3DScenario() ? '220px' : (isSiO2NetworkScenario() ? '236px' : (isSiCNetworkScenario() ? '236px' : (isC3N4NetworkScenario() ? '246px' : '230px')))};">
                        <div class="micro3d-overlay" id="micro3d-overlay-text"></div>
                    </div>
                    <div id="micro3d-legend" class="micro3d-legend"></div>
                    <div class="micro3d-note">Didactic 3D representation: it highlights local geometry and network connectivity, not an exact crystallographic unit cell.</div>
                </div>`;
            safeSetTimeout(initMicro3DThreeScene, 80);
        }

        function initMicro3DThreeScene() {
            const container = document.getElementById('micro3d-three-container');
            if (!container || typeof THREE === 'undefined') {
                renderMicroscopic3DModelOnStage();
                return;
            }

            disposeMicro3DScene();

            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a1128, 0.028);

            const width = container.clientWidth || 500;
            const height = container.clientHeight || 315;
            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            if (renderer.outputEncoding !== undefined) renderer.outputEncoding = THREE.sRGBEncoding;
            if (THREE.ACESFilmicToneMapping) renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);
            window.__micro3dRenderer = renderer;

            const ambient = new THREE.AmbientLight(0xffffff, 0.55);
            scene.add(ambient);
            const dir = new THREE.DirectionalLight(0xffffff, 1.35);
            dir.position.set(18, 28, 22);
            scene.add(dir);
            const point = new THREE.PointLight(0x60a5fa, 1.2, 90);
            point.position.set(-12, 4, -14);
            scene.add(point);

            const root = new THREE.Group();
            scene.add(root);

            const state = {
                scene, camera, renderer, root,
                ions: [], electrons: [], molecules: [], atoms: [],
                theta: Math.PI / 4, phi: Math.PI / 2.45, radius: 30,
                isDragging: false, previous: { x: 0, y: 0 },
                boundingBox: 12,
                kind: currentScenario.type
            };
            window.__micro3dSceneState = state;

            buildMicro3DObjects(state);
            // Escalado visual global del modelo 3D.
            // For SiC, the lattice is reduced further so that it remains well contained within the window.
            state.root.scale.setScalar(
                currentScenario.type === 'ionic' ? getIonicModelScale() :
                (currentScenario.type === 'metallic' ? 1.55 : (isSiCNetworkScenario() ? 1.35 : (isC3N4NetworkScenario() ? 1.95 : 2.0)))
            );
            if (currentScenario.type === 'ionic') {
                state.radius = getIonicModelCameraRadius();
                state.phi = Math.PI / 2.62;
            }
            if (currentScenario.type === 'metallic') {
                state.radius = 26.0;
                state.phi = Math.PI / 2.62;
            }
            if (isDiamond3DScenario()) {
                state.radius = 22.8;
                state.phi = Math.PI / 2.78;
            }
            if (isSiO2NetworkScenario()) {
                state.radius = 39;
                state.phi = Math.PI / 2.55;
            }
            if (isSiCNetworkScenario()) {
                state.radius = 31.5;
                state.phi = Math.PI / 2.72;
            }
            if (isC3N4NetworkScenario()) {
                state.radius = 27.5;
                state.phi = Math.PI / 2.58;
            }
            if (typeof isLargeSolidDiatomicScenario === 'function' && isLargeSolidDiatomicScenario()) {
                state.root.scale.setScalar(1.62);
                state.radius = 35.0;
                state.phi = Math.PI / 2.58;
            }
            if (typeof getCompactMolecule3DScale === 'function' && currentScenario.type === 'covalent' && ['CO2','CS2','H2O','H2S','SF2','PH3','PCl3','PF3','PBr3','PI3'].includes(currentScenario.form)) {
                state.radius = Math.max(state.radius || 0, ['CS2','PCl3','PBr3','PI3'].includes(currentScenario.form) ? 34.0 : 30.0);
                state.phi = Math.PI / 2.60;
            }
            updateMicro3DCamera(state);

            container.addEventListener('mousedown', (e) => {
                state.isDragging = true;
                state.previous = { x: e.offsetX, y: e.offsetY };
            });
            container.addEventListener('mousemove', (e) => {
                if (!state.isDragging) return;
                state.theta -= (e.offsetX - state.previous.x) * 0.008;
                state.phi -= (e.offsetY - state.previous.y) * 0.008;
                if (typeof isLargeSolidDiatomicScenario === 'function' && isLargeSolidDiatomicScenario()) {
                state.root.scale.setScalar(1.62);
                state.radius = 35.0;
                state.phi = Math.PI / 2.58;
            }
            updateMicro3DCamera(state);
                state.previous = { x: e.offsetX, y: e.offsetY };
            });
            window.addEventListener('mouseup', () => { if (window.__micro3dSceneState) window.__micro3dSceneState.isDragging = false; });

            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    state.isDragging = true;
                    state.previous = { x: e.touches[0].pageX, y: e.touches[0].pageY };
                }
            }, { passive: false });
            container.addEventListener('touchmove', (e) => {
                if (!state.isDragging || e.touches.length !== 1) return;
                e.preventDefault();
                state.theta -= (e.touches[0].pageX - state.previous.x) * 0.010;
                state.phi -= (e.touches[0].pageY - state.previous.y) * 0.010;
                if (typeof isLargeSolidDiatomicScenario === 'function' && isLargeSolidDiatomicScenario()) {
                state.root.scale.setScalar(1.62);
                state.radius = 35.0;
                state.phi = Math.PI / 2.58;
            }
            updateMicro3DCamera(state);
                state.previous = { x: e.touches[0].pageX, y: e.touches[0].pageY };
            }, { passive: false });
            window.addEventListener('touchend', () => { if (window.__micro3dSceneState) window.__micro3dSceneState.isDragging = false; });

            const ro = new ResizeObserver(() => {
                const w = container.clientWidth || 500;
                const h = container.clientHeight || 315;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });
            ro.observe(container);

            animateMicro3D();
        }

        function updateMicro3DCamera(state) {
            state.phi = Math.max(0.18, Math.min(Math.PI - 0.18, state.phi));
            state.camera.position.x = state.radius * Math.sin(state.phi) * Math.cos(state.theta);
            state.camera.position.y = state.radius * Math.cos(state.phi);
            state.camera.position.z = state.radius * Math.sin(state.phi) * Math.sin(state.theta);
            state.camera.lookAt(0, 0, 0);
        }

        function makeMicroSphere(label, radius, color, metalness = 0.25, roughness = 0.35) {
            const geo = new THREE.SphereGeometry(radius, 28, 28);
            const mat = new THREE.MeshStandardMaterial({
                color,
                roughness,
                metalness,
                emissive: new THREE.Color(color).multiplyScalar(0.08)
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.userData.label = label;
            return mesh;
        }

        function makeMicroLine(a, b, color = 0xffffff, opacity = 0.25, width = 1) {
            const geo = new THREE.BufferGeometry().setFromPoints([a, b]);
            const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity, linewidth: width });
            return new THREE.Line(geo, mat);
        }

        function buildMicro3DObjects(state) {
            const overlay = document.getElementById('micro3d-overlay-text');
            if (currentScenario.type === 'metallic') {
                if (overlay) overlay.innerHTML = '';
                buildMetal3D(state);
            } else if (currentScenario.type === 'ionic') {
                if (overlay) {
                    const cat = currentScenario.e1 || 'Na';
                    const an = currentScenario.e2 || 'Cl';
                    const catColor = colorHexToCss(getCPKAtomStyle(cat).color);
                    const anColor = colorHexToCss(getCPKAtomStyle(an).color);
                    const catCharge = getElementalIonChargeText(cat, true);
                    const anCharge = getElementalIonChargeText(an, false);
                    overlay.innerHTML = '';
                }
                buildIonic3D(state);
            } else if (currentScenario.type === 'covalent_atomic') {
                if (overlay) overlay.innerHTML = '';
                if ((currentScenario.form || '').toLowerCase().includes('sio2') || (currentScenario.e1 === 'Si' && currentScenario.e2 === 'O')) {
                    buildSiO23D(state);
                } else if ((currentScenario.form || '') === 'SiC') {
                    buildSiC3D(state);
                } else if ((currentScenario.form || '') === 'C3N4') {
                    buildC3N43D(state);
                } else {
                    buildDiamond3D(state);
                }
            } else if (currentScenario.type === 'covalent') {
                if (overlay) {
                    const ph = getMolecularPhysicalStateRT(currentScenario);
                    const phTxt = ph === 'liquid' ? 'liquid: nearby molecules' : (ph === 'solid' ? 'solid molecular: close-packed molecules' : 'gas: separate molecules');
                    overlay.innerHTML = '';
                }
                buildMolecular3D(state);
            } else {
                if (overlay) overlay.innerHTML = '';
                buildNobleGas3D(state);
            }
        }

        function buildMetal3D(state) {
            const sym = currentScenario.e1 || 'M';
            const grid = 5, spacing = 1.58, offset = (grid * spacing) / 2 - spacing / 2;
            const lineGroup = new THREE.Group();
            const basePositions = [];
            for (let x = 0; x < grid; x++) for (let y = 0; y < grid; y++) for (let z = 0; z < grid; z++) {
                const base = new THREE.Vector3(x * spacing - offset, y * spacing - offset, z * spacing - offset);
                const st = getCPKAtomStyle(sym);
                // In metallic lattices we use the metal CPK colour for the cations.
                const ion = makeMicroSphere(sym, 0.74, st.color, 0.65, 0.26);
                ion.position.copy(base);
                state.root.add(ion);
                state.ions.push({ mesh: ion, basePos: base, phase: Math.random() * Math.PI * 2, speed: 0.045 + Math.random() * 0.03 });
                basePositions.push(base);
            }
            for (let i = 0; i < basePositions.length; i++) {
                for (let j = i + 1; j < basePositions.length; j++) {
                    const dist = basePositions[i].distanceTo(basePositions[j]);
                    if (dist < spacing + 0.05) lineGroup.add(makeMicroLine(basePositions[i], basePositions[j], 0xffffff, 0.12));
                }
            }
            state.root.add(lineGroup);
            state.boundingBox = (grid * spacing) / 2 + 0.35;
            const electronGeo = new THREE.SphereGeometry(0.22, 10, 10);
            const electronMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            for (let i = 0; i < 120; i++) {
                const e = new THREE.Mesh(electronGeo, electronMat);
                e.position.set((Math.random() - 0.5) * state.boundingBox * 1.25, (Math.random() - 0.5) * state.boundingBox * 1.25, (Math.random() - 0.5) * state.boundingBox * 1.25);
                state.root.add(e);
                state.electrons.push({ mesh: e, velocity: new THREE.Vector3((Math.random()-0.5)*0.45, (Math.random()-0.5)*0.45, (Math.random()-0.5)*0.45) });
            }
        }

        function buildIonic3D(state) {
            const cat = currentScenario.e1 || 'Ca';
            const an = currentScenario.e2 || 'P';
            const catSt = getIonicVisualStyle(cat, true);
            const anSt = getIonicVisualStyle(an, false);
            const grid = 4;
            const spacing = Math.max(1.45, Math.min(1.95, catSt.radius + anSt.radius + 0.10));
            const offset = (grid * spacing) / 2 - spacing / 2;
            const basePositions = [];
            const lineGroup = new THREE.Group();

            for (let x = 0; x < grid; x++) for (let y = 0; y < grid; y++) for (let z = 0; z < grid; z++) {
                const positive = (x + y + z) % 2 === 0;
                const ionSym = positive ? cat : an;
                const st = positive ? catSt : anSt;
                const chargeText = (typeof getElementalIonChargeText === 'function') ? getElementalIonChargeText(ionSym, positive) : getSimpleIonChargeText(ionSym, positive);
                const label = `${ionSym}${chargeText}`;
                const mesh = makeMicroSphere(label, st.radius, st.color, 0.18, 0.42);
                const base = new THREE.Vector3(x * spacing - offset, y * spacing - offset, z * spacing - offset);
                mesh.position.copy(base);
                state.root.add(mesh);
                state.ions.push({ mesh, basePos: base, phase: Math.random() * Math.PI * 2, speed: 0.030 + Math.random() * 0.020 });
                basePositions.push(base);
            }

            for (let i = 0; i < basePositions.length; i++) {
                for (let j = i + 1; j < basePositions.length; j++) {
                    const dist = basePositions[i].distanceTo(basePositions[j]);
                    if (dist < spacing + 0.08) {
                        lineGroup.add(makeMicroLine(basePositions[i], basePositions[j], 0xffffff, 0.09));
                    }
                }
            }
            state.root.add(lineGroup);
            state.boundingBox = offset + Math.max(catSt.radius, anSt.radius) + 0.25;
        }

        function buildDiamond3D(state) {
            const symA = currentScenario.e1 || 'C';
            const symB = (currentScenario.e2 && currentScenario.e2 !== currentScenario.e1) ? currentScenario.e2 : symA;

            // Lattice type diamond / zinc blende: coordinacion tetrahedral exacta.
            // Todos the bonds generados hasn la same longitud and los angles locales son 109.5°.
            const a = 5.8; // parámetro de lattice visual ampliado so that el diamond se vea más grande en pantalla
            const nx = 2, ny = 2, nz = 2; // 64 atoms en total
            const basisA = [
                [0, 0, 0],
                [0, 0.5, 0.5],
                [0.5, 0, 0.5],
                [0.5, 0.5, 0]
            ];
            const basisB = [
                [0.25, 0.25, 0.25],
                [0.25, 0.75, 0.75],
                [0.75, 0.25, 0.75],
                [0.75, 0.75, 0.25]
            ];
            const allAtoms = [];
            const atomKeySet = new Set();

            function addAtomRecord(sym, sublattice, fx, fy, fz) {
                const px = fx * a;
                const py = fy * a;
                const pz = fz * a;
                const key = `${sublattice}|${fx.toFixed(4)}|${fy.toFixed(4)}|${fz.toFixed(4)}`;
                if (atomKeySet.has(key)) return;
                atomKeySet.add(key);
                allAtoms.push({ sym, sublattice, pos: new THREE.Vector3(px, py, pz) });
            }

            for (let ix = 0; ix < nx; ix++) {
                for (let iy = 0; iy < ny; iy++) {
                    for (let iz = 0; iz < nz; iz++) {
                        basisA.forEach(([x, y, z]) => addAtomRecord(symA, 'A', ix + x, iy + y, iz + z));
                        basisB.forEach(([x, y, z]) => addAtomRecord(symB, 'B', ix + x, iy + y, iz + z));
                    }
                }
            }

            // Centrar el conjunto.
            const min = new THREE.Vector3(Infinity, Infinity, Infinity);
            const max = new THREE.Vector3(-Infinity, -Infinity, -Infinity);
            allAtoms.forEach(aRec => {
                min.min(aRec.pos);
                max.max(aRec.pos);
            });
            const center = min.clone().add(max).multiplyScalar(0.5);
            allAtoms.forEach(aRec => {
                aRec.pos.sub(center);
                aRec.pos.y += 3.25; // moves the diamond upward so that it fits better in the window
            });

            // Create spheres.
            allAtoms.forEach(aRec => {
                const st = getCPKAtomStyle(aRec.sym);
                const atom = makeMicroSphere(aRec.sym, st.radius * 0.84, st.color, 0.10, 0.28);
                atom.position.copy(aRec.pos);
                state.root.add(atom);
                state.atoms.push({ mesh: atom, basePos: aRec.pos.clone(), phase: Math.random() * Math.PI * 2, speed: 0.011 });
                aRec.mesh = atom;
            });

            // Generate bonds only between nearest neighbours A-B.
            const nn = a * Math.sqrt(3) / 4;
            const thresh = nn * 1.08;
            for (let i = 0; i < allAtoms.length; i++) {
                for (let j = i + 1; j < allAtoms.length; j++) {
                    if (allAtoms[i].sublattice === allAtoms[j].sublattice) continue;
                    const d = allAtoms[i].pos.distanceTo(allAtoms[j].pos);
                    if (d <= thresh) {
                        state.root.add(makeMicroLine(allAtoms[i].pos, allAtoms[j].pos, 0xf8fafc, 0.92, 0.82));
                    }
                }
            }
        }

        function buildSiC3D(state) {
            // El carborundo adopta una lattice 3D tetrahedral type diamond / zinc blende.
            // Reutilizamos la same geometry que el diamond, pero con Si and C alternados.
            buildDiamond3D(state);
        }

        function buildC3N43D(state) {
            const cSym = 'C';
            const nSym = 'N';
            const cStyle = getCPKAtomStyle(cSym);
            const nStyle = getCPKAtomStyle(nSym);

            // Modelo 3D didáctico conectado para C3N4:
            // - todos los C hasn el same tamaño;
            // - todos los N hasn el same tamaño;
            // - el C central has geometry tetrahedral exacta (4 N a ~109.5°);
            // - cada N del primer entorno se une a 3 C en total;
            // - se añaden N más externos para sugerir continuidad de lattice sin fragmentarla.
            const C_RADIUS_SCALE = 0.62;
            const N_RADIUS_SCALE = 0.54;
            const tetraDirs = [
                new THREE.Vector3(1, 1, 1).normalize(),
                new THREE.Vector3(-1, -1, 1).normalize(),
                new THREE.Vector3(-1, 1, -1).normalize(),
                new THREE.Vector3(1, -1, -1).normalize()
            ];

            const atomRecords = [];
            const bondRecords = [];
            const guideRecords = [];
            const atomKeyMap = new Map();
            const bondKeySet = new Set();

            function keyFor(v) {
                return `${v.x.toFixed(3)}|${v.y.toFixed(3)}|${v.z.toFixed(3)}`;
            }
            function addAtomRecord(type, pos, highlight = false) {
                const key = `${type}|${keyFor(pos)}`;
                if (atomKeyMap.has(key)) return atomKeyMap.get(key);
                const rec = { type, pos: pos.clone(), highlight };
                atomRecords.push(rec);
                atomKeyMap.set(key, rec);
                return rec;
            }
            function addBondRecord(aRec, bRec, opacity = 0.8, width = 1) {
                const ka = `${aRec.type}|${keyFor(aRec.pos)}`;
                const kb = `${bRec.type}|${keyFor(bRec.pos)}`;
                const key = ka < kb ? `${ka}__${kb}` : `${kb}__${ka}`;
                if (bondKeySet.has(key)) return;
                bondKeySet.add(key);
                bondRecords.push({ a: aRec, b: bRec, opacity, width });
            }
            function choosePerp(u) {
                const ref = Math.abs(u.z) < 0.85 ? new THREE.Vector3(0, 0, 1) : new THREE.Vector3(0, 1, 0);
                const e1 = new THREE.Vector3().crossVectors(u, ref).normalize();
                const e2 = new THREE.Vector3().crossVectors(u, e1).normalize();
                return [e1, e2];
            }
            function otherTetraDirections(u) {
                u = u.clone().normalize();
                const [e1, e2] = choosePerp(u);
                const cosT = -1 / 3;
                const sinT = 2 * Math.sqrt(2) / 3;
                return [0, 2 * Math.PI / 3, 4 * Math.PI / 3].map(phi => {
                    const perp = e1.clone().multiplyScalar(Math.cos(phi)).add(e2.clone().multiplyScalar(Math.sin(phi)));
                    return u.clone().multiplyScalar(cosT).add(perp.multiplyScalar(sinT)).normalize();
                });
            }
            function trigonalCarbonDirectionsAroundN(nPos, parentCPos) {
                const towardParent = parentCPos.clone().sub(nPos).normalize();
                const [e1, e2] = choosePerp(towardParent);
                const tilt = 0.28;
                const side = Math.sqrt(1 - tilt * tilt);
                const dirs = [0, 2 * Math.PI / 3, 4 * Math.PI / 3].map(phi => {
                    const perp = e1.clone().multiplyScalar(Math.cos(phi)).add(e2.clone().multiplyScalar(Math.sin(phi)));
                    return towardParent.clone().multiplyScalar(tilt).add(perp.multiplyScalar(side)).normalize();
                });
                return [dirs[1], dirs[2]];
            }

            const c0Pos = new THREE.Vector3(0, 0, 0);
            const c0 = addAtomRecord('C', c0Pos, true);
            const CN = 2.55;
            const NC = 2.05;
            const firstNs = [];

            tetraDirs.forEach(dir => {
                const np = c0Pos.clone().add(dir.clone().multiplyScalar(CN));
                const nRec = addAtomRecord('N', np, false);
                firstNs.push(nRec);
                addBondRecord(c0, nRec, 0.95, 1.8);
            });

            // Cada N del primer entorno se une a dos carbons más: N bonded to 3 C.
            firstNs.forEach(nRec => {
                const extraCDirs = trigonalCarbonDirectionsAroundN(nRec.pos, c0Pos);
                extraCDirs.forEach(d => {
                    const cp = nRec.pos.clone().add(d.clone().multiplyScalar(NC));
                    const cRec = addAtomRecord('C', cp, false);
                    addBondRecord(cRec, nRec, 0.62, 1.1);

                    // For each of these C atoms, add 3 additional N atoms in other tetrahedral directions.
                    const u = nRec.pos.clone().sub(cp).normalize();
                    const extNDirections = otherTetraDirections(u);
                    extNDirections.forEach(ndir => {
                        const n2p = cp.clone().add(ndir.clone().multiplyScalar(CN * 0.92));
                        const n2Rec = addAtomRecord('N', n2p, false);
                        addBondRecord(cRec, n2Rec, 0.30, 0.8);
                    });
                });
            });

            // Soft guides between the 4 N atoms of the central tetrahedral environment.
            for (let i = 0; i < firstNs.length; i++) {
                for (let j = i + 1; j < firstNs.length; j++) {
                    guideRecords.push({ a: firstNs[i].pos.clone(), b: firstNs[j].pos.clone() });
                }
            }

            // Drawr guías first.
            guideRecords.forEach(g => {
                state.root.add(makeMicroLine(g.a, g.b, 0x93c5fd, 0.17, 0.5));
            });

            bondRecords.forEach(b => {
                state.root.add(makeMicroLine(b.a.pos, b.b.pos, 0xf8fafc, b.opacity, b.width));
            });

            atomRecords.forEach((rec, idx) => {
                const style = rec.type === 'C' ? cStyle : nStyle;
                const scale = rec.type === 'C' ? C_RADIUS_SCALE : N_RADIUS_SCALE;
                const atom = makeMicroSphere(rec.type, style.radius * scale, style.color, 0.10, 0.28);
                atom.position.copy(rec.pos);
                if (rec.highlight) {
                    const ringGeo = new THREE.RingGeometry(style.radius * scale * 1.26, style.radius * scale * 1.40, 40);
                    const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.95, side: THREE.DoubleSide });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.rotation.x = Math.PI / 2;
                    ring.position.copy(rec.pos);
                    state.root.add(ring);
                    state.atoms.push({ mesh: ring, basePos: rec.pos.clone(), phase: Math.random() * Math.PI * 2, speed: 0.006, amp: 0.018, isRing: true });
                }
                state.root.add(atom);
                const amp = rec.highlight ? 0.020 : 0.024;
                state.atoms.push({ mesh: atom, basePos: rec.pos.clone(), phase: Math.random() * Math.PI * 2, speed: 0.010 + (idx % 4) * 0.0006, amp });
            });
        }

        function buildSiO23D(state) {
            const siSym = 'Si';
            const oSym = 'O';

            // SiO2 lattice based on a tetrahedral Si network.
            // Each Si is bonded to 4 O atoms with exact tetrahedral geometry (109.5° around Si).
            // Each O is placed as a bridging oxygen between 2 Si atoms, so that the overall stoichiometry is SiO2.
            // Note: to simultaneously respect the 1:2 stoichiometry and tetrahedral connectivity,
            // the total number of atoms cannot exactly match diamond if that model only has C atoms.
            const a = 5.2;
            const nx = 2, ny = 2, nz = 2;
            const basisA = [
                [0, 0, 0],
                [0, 0.5, 0.5],
                [0.5, 0, 0.5],
                [0.5, 0.5, 0]
            ];
            const basisB = [
                [0.25, 0.25, 0.25],
                [0.25, 0.75, 0.75],
                [0.75, 0.25, 0.75],
                [0.75, 0.75, 0.25]
            ];
            const siAtoms = [];
            const oAtoms = [];
            const bondPairs = [];
            const siKeySet = new Set();
            const oKeySet = new Set();
            const bondKeySet = new Set();

            function roundedKey(v) {
                return `${v.x.toFixed(4)}|${v.y.toFixed(4)}|${v.z.toFixed(4)}`;
            }
            function addSiRecord(fx, fy, fz) {
                const key = `${fx.toFixed(4)}|${fy.toFixed(4)}|${fz.toFixed(4)}`;
                if (siKeySet.has(key)) return;
                siKeySet.add(key);
                siAtoms.push({ pos: new THREE.Vector3(fx * a, fy * a, fz * a) });
            }

            for (let ix = 0; ix < nx; ix++) {
                for (let iy = 0; iy < ny; iy++) {
                    for (let iz = 0; iz < nz; iz++) {
                        basisA.forEach(([x, y, z]) => addSiRecord(ix + x, iy + y, iz + z));
                        basisB.forEach(([x, y, z]) => addSiRecord(ix + x, iy + y, iz + z));
                    }
                }
            }

            // Centrar first los Si.
            const min = new THREE.Vector3(Infinity, Infinity, Infinity);
            const max = new THREE.Vector3(-Infinity, -Infinity, -Infinity);
            siAtoms.forEach(rec => { min.min(rec.pos); max.max(rec.pos); });
            const center = min.clone().add(max).multiplyScalar(0.5);
            siAtoms.forEach(rec => rec.pos.sub(center));

            // Vecinos Si-Si in the network tetrahedral base.
            const nn = a * Math.sqrt(3) / 4;
            const thresh = nn * 1.05;
            for (let i = 0; i < siAtoms.length; i++) {
                for (let j = i + 1; j < siAtoms.length; j++) {
                    const d = siAtoms[i].pos.distanceTo(siAtoms[j].pos);
                    if (d <= thresh) {
                        const mid = siAtoms[i].pos.clone().add(siAtoms[j].pos).multiplyScalar(0.5);
                        const oKey = roundedKey(mid);
                        let oIndex = oAtoms.findIndex(o => roundedKey(o.pos) === oKey);
                        if (oIndex === -1) {
                            oIndex = oAtoms.length;
                            oAtoms.push({ pos: mid });
                        }
                        bondPairs.push({ siIndex: i, oIndex });
                        bondPairs.push({ siIndex: j, oIndex });
                    }
                }
            }

            const siStyle = getCPKAtomStyle(siSym);
            const oStyle = getCPKAtomStyle(oSym);
            siAtoms.forEach(rec => {
                const atom = makeMicroSphere(siSym, siStyle.radius * 0.76, siStyle.color, 0.10, 0.30);
                atom.position.copy(rec.pos);
                state.root.add(atom);
                state.atoms.push({ mesh: atom, basePos: rec.pos.clone(), phase: Math.random() * Math.PI * 2, speed: 0.010 });
            });
            oAtoms.forEach(rec => {
                const atom = makeMicroSphere(oSym, oStyle.radius * 0.58, oStyle.color, 0.10, 0.30);
                atom.position.copy(rec.pos);
                state.root.add(atom);
                state.atoms.push({ mesh: atom, basePos: rec.pos.clone(), phase: Math.random() * Math.PI * 2, speed: 0.012 });
            });

            bondPairs.forEach(({ siIndex, oIndex }) => {
                const key = `${siIndex}__${oIndex}`;
                if (bondKeySet.has(key)) return;
                bondKeySet.add(key);
                state.root.add(makeMicroLine(siAtoms[siIndex].pos, oAtoms[oIndex].pos, 0xf8fafc, 0.88, 0.64));
            });
        }

        function buildNobleGas3D(state) {
            const sym = currentScenario.e1 || 'Ne';
            state.boundingBox = 9.2;
            for (let i = 0; i < 14; i++) {
                const st = getCPKAtomStyle(sym);
                const a = makeMicroSphere(sym, st.radius * (0.95 + Math.random()*0.12), st.color, 0.04, 0.34);
                a.position.set((Math.random()-0.5)*16.0, (Math.random()-0.5)*11.5, (Math.random()-0.5)*14.0);
                const dir = new THREE.Vector3((Math.random()-0.5), (Math.random()-0.5), (Math.random()-0.5));
                if (dir.length() < 0.001) dir.set(1, 0, 0);
                dir.normalize().multiplyScalar(0.095 + Math.random() * 0.025);
                state.root.add(a);
                // Noble gas atoms move in straight lines at constant speed between wall collisions.
                state.electrons.push({ mesh: a, velocity: dir, phaseState: 'noble_gas_atom' });
            }
        }

        function makeCPKAtom(sym) {
            const st = getCPKAtomStyle(sym);
            const geo = new THREE.SphereGeometry(st.radius, 36, 36);
            const emissiveBoost = sym === 'H' ? 0.08 : (sym === 'F' ? 0.11 : 0.06);

        }

        function getMolecularPhysicalStateRT(sc) {
            const f = sc.form || '';
            if (['I2', 'P4', 'S8', 'NI3', 'CI4', 'CBr4', 'SiI4'].includes(f)) return 'solid';
            if (['H2O', 'Br2'].includes(f)) return 'liquid';
            return 'gas';
        }

        function isLargeSolidDiatomicScenario() {
            if (!currentScenario || currentScenario.type !== 'covalent') return false;
            const phase = getMolecularPhysicalStateRT(currentScenario);
            if (phase !== 'solid') return false;
            const b = currentScenario.builder || {};
            const center = b.center || currentScenario.e1 || '';
            const periph = (b.periph && b.periph[0]) || currentScenario.e2 || currentScenario.e1 || '';
            const data = typeof getMolecularGeometryData === 'function' ? getMolecularGeometryData() : null;
            const isDiatomic = !!(data?.isDiatomic || ((b.periph || []).length === 1 && center === periph));
            if (!isDiatomic) return false;
            const maxR = Math.max(getCPKAtomStyle(center).radius, getCPKAtomStyle(periph).radius);
            return maxR >= 1.15;
        }

        function getDiatomicLonePairCap(pos) {
            if (!currentScenario || currentScenario.type !== 'covalent') return null;
            const b = currentScenario.builder || {};
            const data = typeof getMolecularGeometryData === 'function' ? getMolecularGeometryData() : null;
            const isDiatomic = !!(data?.isDiatomic || ((b.periph || []).length === 1));
            if (!isDiatomic) return null;
            const exp = b.expectedLp || {};
            if (pos === 'center') return Number.isFinite(exp.center) ? exp.center : null;
            const idx = Number(pos);
            if (!Number.isNaN(idx) && Array.isArray(exp.periph) && Number.isFinite(exp.periph[idx])) return exp.periph[idx];
            if (Array.isArray(exp.periph) && Number.isFinite(exp.periph[0])) return exp.periph[0];
            return null;
        }

        function getDiatomicScaleForPhase(phase, maxRadius) {
            if (phase === 'solid') {
                if (maxRadius >= 1.15) return 0.78;
                if (maxRadius >= 1.00) return 0.88;
                return 1.00;
            }
            if (phase === 'liquid') {
                if (maxRadius >= 1.00) return 0.92;
                return 1.00;
            }
            if (maxRadius <= 0.60) return 1.34;
            if (maxRadius <= 0.72) return 1.28;
            if (maxRadius <= 0.82) return 1.24;
            if (maxRadius <= 0.98) return 1.16;
            if (maxRadius <= 1.08) return 1.06;
            return 0.96;
        }


        function getCompactMolecule3DScale(formula, kind, phase, maxRadius) {
            const f = formula || '';
            if (['CO2', 'CS2'].includes(f)) return maxRadius >= 1.0 ? 0.78 : 0.88;
            if (['H2O', 'H2S', 'SF2', 'OF2', 'OCl2', 'SCl2'].includes(f)) return maxRadius >= 1.0 ? 0.86 : 0.96;
            if (['PH3', 'PCl3', 'PF3', 'PBr3', 'PI3', 'NH3', 'NF3', 'NCl3', 'NBr3', 'NI3'].includes(f)) return maxRadius >= 1.0 ? 0.82 : 0.94;
            if (kind === 'diatomic') return getDiatomicScaleForPhase(phase, maxRadius);
            return phase === 'gas' ? 1.35 : (phase === 'liquid' ? 0.98 : 0.95);
        }

        function makeSpaceFillingMoleculeGroup(kind, center, periph) {
            const g = new THREE.Group();
            const centerStyle = getCPKAtomStyle(center);
            const periphStyle = getCPKAtomStyle(periph);
            const centralAtom = makeCPKAtom(center);

            const addAtom = (pos, label) => {
                const a = makeCPKAtom(label);
                a.position.set(pos[0], pos[1], pos[2]);
                g.add(a);
            };

            const bondDist = Math.max(0.70, 0.82 * (centerStyle.radius + periphStyle.radius));

            if (kind === 'diatomic') {
                const a = makeCPKAtom(center);
                const b = makeCPKAtom(periph);
                a.position.set(-bondDist / 2, 0, 0);
                b.position.set( bondDist / 2, 0, 0);
                g.add(a); g.add(b);
                return g;
            }

            g.add(centralAtom);

            if (kind === 'linear') {
                addAtom([-bondDist, 0, 0], periph);
                addAtom([ bondDist, 0, 0], periph);
            } else if (kind === 'angular') {
                const angle = 104.5 * Math.PI / 180;
                addAtom([ Math.sin(angle/2) * bondDist, -Math.cos(angle/2) * bondDist, 0], periph);
                addAtom([-Math.sin(angle/2) * bondDist, -Math.cos(angle/2) * bondDist, 0], periph);
            } else if (kind === 'pyramid') {
                const dirs = [
                    new THREE.Vector3(-0.78, -0.42, 0.46),
                    new THREE.Vector3( 0.78, -0.42, 0.46),
                    new THREE.Vector3( 0.00, -0.42,-0.92)
                ];
                dirs.forEach(v => {
                    v.normalize().multiplyScalar(bondDist);
                    addAtom([v.x, v.y, v.z], periph);
                });
            } else {
                const dirs = [
                    new THREE.Vector3( 1,  1,  1),
                    new THREE.Vector3(-1, -1,  1),
                    new THREE.Vector3(-1,  1, -1),
                    new THREE.Vector3( 1, -1, -1)
                ];
                dirs.forEach(v => {
                    v.normalize().multiplyScalar(bondDist);
                    addAtom([v.x, v.y, v.z], periph);
                });
            }
            return g;
        }

        function getLegendAtomSymbols() {
            const uniq = [];
            const add = s => { if (s && !uniq.includes(s)) uniq.push(s); };
            if (currentScenario.type === 'none') {
                add(currentScenario.e1);
            } else if (currentScenario.type === 'metallic') {
                add(currentScenario.e1);
            } else if (currentScenario.type === 'ionic') {
                add(currentScenario.e1);
                add(currentScenario.e2);
            } else if (currentScenario.type === 'covalent_atomic') {
                add(currentScenario.e1);
                if (currentScenario.e2 && currentScenario.e2 !== currentScenario.e1) add(currentScenario.e2);
            } else if (currentScenario.type === 'covalent') {
                const b = currentScenario.builder || {};
                add(b.center || currentScenario.e1);
                if (Array.isArray(b.periph) && b.periph.length) b.periph.forEach(add);
                else add(currentScenario.e2);
            }
            return uniq.filter(Boolean);
        }

        function buildMolecular3D(state) {

            const data = typeof getMolecularGeometryData === 'function' ? getMolecularGeometryData() : null;
            const center = b.center || currentScenario.e1 || 'A';
            const periph = (b.periph && b.periph[0]) || currentScenario.e2 || currentScenario.e1 || 'B';
            let kind = 'diatomic';
            if (data?.isDiatomic) kind = 'diatomic';
            else if (data?.geometry === 'linear') kind = 'linear';
            else if (data?.geometry === 'angular') kind = 'angular';
