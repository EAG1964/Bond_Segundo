<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemical Bonding and Chemical Substances</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilos para el Constructor Interactivo Drag & Drop and Informe Final */
        .lewis-board {
            display: grid;
            grid-template-columns: 42px 32px 42px 32px 42px;
            grid-template-rows: 42px 32px 42px 32px 42px;
            gap: 3px;
            background: #ffffff;
            padding: 0.8rem;
            border-radius: 1rem;
            border: 2px dashed #cbd5e1;
            margin: 0 auto;
        }
        .lewis-cell { display: flex; align-items: center; justify-content: center; }
        .atom-box {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #cbd5e1;
            font-weight: bold; font-size: 1.05rem;
            line-height: 1; /* Optical font centering */
            position: relative;
            user-select: none;
            color: #1e293b;
        }
        
        /* Drop zone */
        .dropzone { border: 2px dashed #94a3b8; background: #f8fafc; transition: all 0.2s; }
        .dropzone.drag-over { background: #e0e7ff; border-color: #6366f1; transform: scale(1.05); }
        
        /* Draggable atoms */
        .draggable-atom {
            cursor: grab;
            background: #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.1s;
        }
        .draggable-atom:active { cursor: grabbing; transform: scale(0.95); }
        
        .center-atom-placed { background: #e0e7ff; border-color: #818cf8; cursor: pointer; }
        .center-atom-placed:active { transform: scale(0.95); }
        
        .periph-atom-placed { background: #f8fafc; border-color: #94a3b8; cursor: pointer; }
        .periph-atom-placed:active { transform: scale(0.95); }

        /* Perfectly centered bonds */
        .bond-box { background: transparent; border-radius: 4px; user-select: none; transition: background 0.2s;}
        .bond-box-active { cursor: pointer; background: #f1f5f9; }
        .bond-box-active:hover { background: #e2e8f0; }
        .bond-h { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: stretch; padding: 0 3px; gap: 3px; }
        .bond-v { width: 100%; height: 100%; display: flex; flex-direction: row; justify-content: center; align-items: stretch; padding: 3px 0; gap: 3px; }
        .bond-line-h { height: 3px; background-color: #3b82f6; border-radius: 9999px; width: 100%; }
        .bond-line-v { width: 3px; background-color: #3b82f6; border-radius: 9999px; height: 100%; }

        /* Pares Solitarios */
        .lp-dot {
            position: absolute; color: #ef4444; font-size: 1.15rem; line-height: 0;
            letter-spacing: 1px; font-weight: bold; pointer-events: none;
        }
        
        /* Auto Scroll */
        html { scroll-behavior: smooth; }

        /* License and Badge */
        .licencia-bloque { margin-top: 6px; background: #f1f5f9; color: #475569; font-size: 12px; text-align: center; border-radius: 8px; padding: 6px; border: 1px solid #e2e8f0; width: 100%; }
        .badge-container { margin-bottom: 3px; display: flex; justify-content: center; align-items: center; }

        /* Prevents long forms from hiding the check button */
        #input-area {
            max-height: 55%;
            overflow-y: auto;
            flex-shrink: 0;
        }
    
        /* Specific compacting of the lower-right activity block */
        #input-area {
            padding-top: 0.35rem !important;
            padding-bottom: 0.35rem !important;
        }
        #input-area > div {
            gap: 0.35rem !important;
        }
        #input-area .bg-slate-50,
        #input-area .bg-white {
            padding-top: 0.35rem !important;
            padding-bottom: 0.35rem !important;
        }
        #input-area label {
            margin-bottom: 0.15rem !important;
        }
        #input-area select,
        #input-area input[type="text"],
        #input-area input[type="number"] {
            padding-top: 0.25rem !important;
            padding-bottom: 0.25rem !important;
            min-height: 1.9rem !important;
        }
        #input-area button {
            padding-top: 0.4rem !important;
            padding-bottom: 0.4rem !important;
            min-height: 2rem !important;
        }
        #input-area .space-y-1 > :not([hidden]) ~ :not([hidden]),
        #input-area .space-y-1 > :not([hidden]) ~ :not([hidden]),
        #input-area .space-y-1 > :not([hidden]) ~ :not([hidden]) {

        }
        #input-area .grid {
            gap: 0.4rem !important;
        }
        #input-area .ml-4,

            margin-left: 0.9rem !important;
        }

    
        /* Specific compacting de la activity P/G/Orbital configuration */
        #input-area [data-activity="electron-config"] {
            gap: 0.3rem !important;
        }
        #input-area [data-activity="electron-config"] .ec-card {
            padding-top: 0.28rem !important;
            padding-bottom: 0.28rem !important;
        }
        #input-area [data-activity="electron-config"] .ec-grid {
            gap: 0.35rem !important;
        }
        #input-area [data-activity="electron-config"] label {
            margin-bottom: 0.05rem !important;
            line-height: 1.05 !important;
        }

        }

            padding-bottom: 0.35rem !important;

        }

    
        /* Extra compacting for tutor chat bubbles */
        #chat-box > div {
            margin-bottom: 0.15rem !important;
        }

        /* Global adjustment so the left and right panels fit better at 100% */
        @media (min-width: 768px) {
            .md\:w-3\/5.bg-white,
            .md\:w-2\/5.bg-slate-100 {

            }
        }

            overflow-y: auto !important;
        }

            padding-top: 0.35rem !important;
            padding-bottom: 0.35rem !important;

        /* Didactic microscopic 3D model */
        .micro3d-card {
            width: 100%;
            max-width: 520px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            border: 1px solid #cbd5e1;
            border-radius: 1rem;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
            padding: 0.65rem;
            margin: 0 auto;
        }
        .micro3d-title {
            font-weight: 800;
            color: #334155;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .micro3d-subtitle {
            font-size: 0.73rem;
            color: #64748b;
            text-align: center;
            margin-bottom: 0.12rem;
        }
        .micro3d-svg {
            width: 100%;
            max-height: 290px;
            overflow: visible;
        }
        .micro3d-vibrate { animation: microVibrate 1.25s ease-in-out infinite alternate; transform-origin: center; }
        .micro3d-float-a { animation: microFloatA 4.2s ease-in-out infinite alternate; }
        .micro3d-float-b { animation: microFloatB 4.8s ease-in-out infinite alternate; }
        .micro3d-float-c { animation: microFloatC 5.2s ease-in-out infinite alternate; }
        .micro3d-rotate { animation: microRotate 6s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center; }
        .micro3d-electron { animation: microElectron 3.2s linear infinite; }
        .micro3d-electron2 { animation: microElectron2 3.8s linear infinite; }
        .micro3d-pulse { animation: microPulse 1.5s ease-in-out infinite alternate; }
        @keyframes microVibrate { from { transform: translate(-1px, 0.5px); } to { transform: translate(1px, -0.5px); } }
        @keyframes microFloatA { from { transform: translate(-8px, 3px); } to { transform: translate(10px, -6px); } }
        @keyframes microFloatB { from { transform: translate(8px, -2px); } to { transform: translate(-9px, 5px); } }
        @keyframes microFloatC { from { transform: translate(-3px, -6px); } to { transform: translate(5px, 7px); } }
        @keyframes microRotate { from { transform: rotate(-5deg) translateY(1px); } to { transform: rotate(5deg) translateY(-1px); } }
        @keyframes microElectron { from { transform: translateX(-50px); opacity: 0.4; } 50% { opacity: 1; } to { transform: translateX(58px); opacity: 0.45; } }
        @keyframes microElectron2 { from { transform: translate(48px, -3px); opacity: 0.45; } 50% { opacity: 1; } to { transform: translate(-55px, 5px); opacity: 0.45; } }
        @keyframes microPulse { from { opacity: 0.35; } to { opacity: 0.85; } }

    
        /* Visor Three.js real para modelos microscópicos 3D */
        .micro3d-three-card {
            width: 100%;
            max-width: 520px;
            background: #020617;
            background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 1rem;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.16);
            padding: 0.26rem 0.26rem 0.18rem;
            margin: 0 auto;
            color: #ffffff;
        }
        .micro3d-three-title {
            text-shadow: 0 1px 1px rgba(0,0,0,0.28);
            text-align: center;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.05;
            margin-bottom: 0.05rem; font-size: 1.02rem;
        }
        .micro3d-three-subtitle {
            text-shadow: 0 1px 1px rgba(0,0,0,0.22);
            text-align: center;
            font-size: 0.76rem;
            color: #e2e8f0;
            margin-bottom: 0.12rem;
        }

        .micro3d-three-title,
        .micro3d-three-subtitle {
            background: #020617 !important;
            color: #ffffff !important;
            opacity: 1 !important;
            position: relative;
            z-index: 2;
        }
        .micro3d-three-subtitle {
            color: #e2e8f0 !important;
        }
        #micro3d-three-container {
            width: 100%;
            height: 315px;
            border-radius: 0.75rem;
            overflow: hidden;
            background: #0a1128;
            border: 1px solid rgba(255,255,255,0.12);
            position: relative;
            touch-action: none;
        }
        .micro3d-overlay {
            position: absolute;
            left: 8px;
            top: 8px;
            background: rgba(15,23,42,0.72);
            color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 0.55rem;
            padding: 0.24rem 0.36rem;
            font-size: 0.67rem;
            line-height: 1.05;
            max-width: 58%;
            pointer-events: none;
        }
        
        .micro3d-legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.22rem 0.45rem;
            margin-top: 0.06rem;
            font-size: 0.66rem;
            color: #334155;
        }
        .micro3d-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 999px;
            padding: 0.10rem 0.38rem 0.10rem 0.20rem;
            line-height: 1;
        }
        .micro3d-legend-dot {
            width: 0.74rem;
            height: 0.74rem;
            border-radius: 999px;
            border: 1px solid rgba(15,23,42,0.18);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.55);
            flex: 0 0 auto;
        }

        .micro3d-note {
            display: none;
        }
        .micro3d-unit-lewis {
            margin: 0.25rem auto 0.45rem auto;
            width: fit-content;
            max-width: 100%;
            background: rgba(248,250,252,0.96);
            border: 1px solid #cbd5e1;
            border-radius: 0.8rem;
            padding: 0.22rem 0.32rem 0.18rem;
            color: #0f172a;
            box-shadow: 0 2px 8px rgba(15,23,42,0.10);
        }
        .micro3d-unit-lewis-title {
            text-align: center;
            font-size: 0.68rem;
            line-height: 1.05;
            color: #475569;
            font-weight: 700;
            margin-bottom: 0.16rem;
        }
        .micro3d-unit-lewis .lewis-board {
            transform: scale(0.76);
            transform-origin: top center;
            margin: -0.45rem -0.55rem -0.58rem;
        }

    
        /* Scroll and compact layout for the physical properties sheet on the work board */
        #stage-content {
            min-height: 0 !important;
        }
        #stage-content .physical-props-card {
            max-height: 100% !important;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            padding-right: 0.4rem !important;
        }
        #stage-content .physical-props-card select {
            min-height: 1.85rem !important;
            padding-top: 0.2rem !important;
            padding-bottom: 0.2rem !important;
        }
        #stage-content .physical-props-card label {
            line-height: 1.1 !important;
        }

    
        /* Tutor chat: left-aligned text */
        #chat-box > div > div {
            text-align: left !important;
        }

    
        /* Lewis compacto: evita scroll on the work board durante el constructor */
        .lewis-stage-compact {
            max-height: 100%;
            overflow: hidden;
        }
        .lewis-stage-compact .lewis-board {
            transform: scale(0.96);
            transform-origin: center center;
        }

    
        .micro3d-overlay:empty {
            display: none;
        }

    
        .micro3d-three-card.micro3d-diamond-compact {
            padding: 0.22rem !important;
            max-width: 520px;
        }
        .micro3d-diamond-compact .micro3d-three-title {
            text-shadow: 0 1px 1px rgba(0,0,0,0.28);
            font-size: 0.86rem !important;
            line-height: 1.05 !important;
            margin-bottom: 0.02rem !important;
        }
        .micro3d-diamond-compact .micro3d-three-subtitle {
            text-shadow: 0 1px 1px rgba(0,0,0,0.22);
            font-size: 0.66rem !important;
            line-height: 1.05 !important;
            margin-bottom: 0.16rem !important;
        }
        .micro3d-diamond-compact .micro3d-legend {
            margin-top: 0.12rem !important;
            gap: 0.15rem 0.35rem !important;
            font-size: 0.66rem !important;
        }
        .micro3d-diamond-compact .micro3d-legend-dot {
            width: 0.62rem !important;
            height: 0.62rem !important;
        }
        .micro3d-diamond-compact .micro3d-legend-item {
            padding: 0.08rem 0.32rem 0.08rem 0.18rem !important;
        }
        .micro3d-diamond-compact .micro3d-note {
            display: none !important;
        }

    </style>
</head>

    <script>
        // --- GESTIÓN DE TIMEOUTS SEGUROS ---
        let activeTimeouts = [];
        
        function safeSetTimeout(callback, delay) {
            const id = setTimeout(() => {
                activeTimeouts = activeTimeouts.filter(t => t !== id);
                callback();
            }, delay);
            activeTimeouts.push(id);
            return id;
        }

        function clearAllTimeouts() {
            activeTimeouts.forEach(clearTimeout);
            activeTimeouts = [];
        }

        // --- REFERENCIAS DOM ---
        const stageContent = document.getElementById('stage-content');
        const chatBox = document.getElementById('chat-box');
        const inputArea = document.getElementById('input-area');

        // --- CHAT AND AUTOSCROLL FUNCTIONS ---
        function scrollToBottom() {
            if (!chatBox) return;
            const scroll = () => {
                chatBox.scrollTop = chatBox.scrollHeight;
            };
            requestAnimationFrame(scroll);
            setTimeout(scroll, 50);
            setTimeout(scroll, 200);
            setTimeout(scroll, 500);
        }

        // Observador para scroll automático en TODOS los pasos and cambios
        if (chatBox && inputArea) {
            const scrollObserver = new MutationObserver(() => {
                scrollToBottom();
            });
            scrollObserver.observe(chatBox, { childList: true, subtree: true });
            scrollObserver.observe(inputArea, { childList: true, subtree: true });
        }

        // --- USER RESPONSE ---
        function addUserMessage(text) {
            if (!chatBox) return;
            chatBox.innerHTML += `
                <div class="flex justify-end fade-in mb-0.5">
                    <div class="bg-indigo-100 text-indigo-900 rounded-tl-md rounded-tr-md rounded-bl-md px-2 py-1 w-[98%] shadow-sm text-sm break-words font-sans text-left leading-tight">
                        ${text}
                    </div>
                </div>
            `;
        }

        // --- TUTOR RESPONSE ---
        function addTutorMessage(text) {
            if (!chatBox) return;
            chatBox.innerHTML += `
                <div class="flex justify-start fade-in mb-0.5">
                    <div class="bg-white border border-slate-200 text-slate-800 rounded-tr-md rounded-br-md rounded-bl-md px-2 py-1 w-[98%] shadow-sm text-sm break-words font-sans text-left leading-tight">
                        ${text}
                    </div>
                </div>
            `;
        }

        function showContinueButton(nextAction, label = 'Continue') {
            if (!inputArea) return;
            inputArea.innerHTML = `
                <div class="flex flex-col fade-in font-sans space-y-1">
                    <button onclick="${nextAction}" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-1.5 rounded shadow-md transition-colors font-sans">
                        ${label}
                    </button>
                </div>
            `;
        }

        // --- ELEMENT AND SCENARIO DATABASE ---
        const elementsDB = {
            // Metals Alcalinos (Group 1)
            'Li': { z: 3, sym: 'Li', name: 'Lithium', type: 'metal', p: 2, g: 1, val: 1, unpaired: 1, conf: '1s² 2s¹', mass: 6.94 },
            'Na': { z: 11, sym: 'Na', name: 'Sodium', type: 'metal', p: 3, g: 1, val: 1, unpaired: 1, conf: '1s² 2s² 2p⁶ 3s¹', mass: 22.99 },
            'K': { z: 19, sym: 'K', name: 'Potassium', type: 'metal', p: 4, g: 1, val: 1, unpaired: 1, conf: '1s² 2s² 2p⁶ 3s² 3p⁶ 4s¹', mass: 39.10 },
            'Rb': { z: 37, sym: 'Rb', name: 'Rubidium', type: 'metal', p: 5, g: 1, val: 1, unpaired: 1, conf: '1s² 2s² 2p⁶ 3s² 3p⁶ 4s² 3d¹⁰ 4p⁶ 5s¹', mass: 85.47 },

        function fillScenarioSelector() {

                'covalent': { label: 'Molecular Covalent Substances', items: [] },

                'metallic': { label: 'Metals (metallic bond)', items: [] },

            scenarios.forEach((sc, index) => {

                if (groups[groupKey]) {
                    groups[groupKey].items.push({ index, sc });
                }
            });

            const defaultOpt = document.createElement('option');
            defaultOpt.value = 'random';
            defaultOpt.textContent = 'Select a random case';
            selector.appendChild(defaultOpt);

            Object.keys(groups).forEach(key => {
                const optGroup = document.createElement('optgroup');
                optGroup.label = groups[key].label;

                    const option = document.createElement('option');

                    optGroup.appendChild(option);
                });
                
                selector.appendChild(optGroup);
            });
        }

            }

            if (oldPos !== null && oldPos !== 'center') builderState.bonds[oldPos] = 0; 
            if (oldPos === 'center') builderState.bonds = [0,0,0,0];

            if (targetPos === 'inventory') {
                builderState.inventory.push(atomObj);
            } else {
                const existing = builderState.placed[targetPos];
                if (existing) builderState.inventory.push(existing);
                builderState.placed[targetPos] = atomObj;
            }
            renderBuilderUI();
        };

        window.cycleBond = function(index) {
            if (!builderState.placed['center'] || !builderState.placed[index]) return; 
            builderState.bonds[index] = (builderState.bonds[index] + 1) % 4; 
            renderBuilderUI();
        };

        window.cycleLp = function(pos) {
            let maxLp = 0;
            const diatomicCap = getDiatomicLonePairCap(pos);
            if (diatomicCap !== null) {
                maxLp = diatomicCap;
            } else if (pos === 'center') {
                const occupiedDirs = [0, 1, 2, 3].reduce((acc, idx) => acc + (builderState.placed[idx] ? 1 : 0), 0);
                maxLp = Math.max(0, 4 - occupiedDirs);
            } else {
                maxLp = builderState.placed[pos] ? 3 : 0;
            }
            builderState.lp[pos] = (builderState.lp[pos] + 1) % (maxLp + 1);
            renderBuilderUI();
        };
        
        window.resetLewisBoard = function() {
            const b = currentScenario.builder;
            builderState.allAtoms = [];
            let aId = 0;
            builderState.allAtoms.push({ id: `a${aId++}`, sym: b.center });
            b.periph.forEach(sym => { builderState.allAtoms.push({ id: `a${aId++}`, sym: sym }); });
            
            builderState.inventory = [...builderState.allAtoms];
            builderState.placed = { center: null, 0: null, 1: null, 2: null, 3: null };
            builderState.bonds = [0, 0, 0, 0];
            builderState.lp = { center: 0, 0: 0, 1: 0, 2: 0, 3: 0 };
            renderBuilderUI();
        };

        // --- SELECCIÓN DE element type ---

        // --- OBTENER VALENCIA Y CONFIGURACIÓN ---
        window.formatOrbitalNotation = function(el) {
            const map = {'0':'⁰', '1':'¹', '2':'²', '3':'³', '4':'⁴', '5':'⁵', '6':'⁶', '7':'⁷', '8':'⁸', '9':'⁹'};
            const unmap = {'⁰':'0', '¹':'1', '²':'2', '³':'3', '⁴':'4', '⁵':'5', '⁶':'6', '⁷':'7', '⁸':'8', '⁹':'9'};
            
            let val = el.value;
            // 1. Quitar todos los superscripts temporalmente para analizar la cadena limpia
            let unformatted = val.replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹]/g, m => unmap[m]);
            
            // 2. Volver a aplicar superscript SOLO a los numbers continuos que van detrás de s, p, d, f
            let formatted = unformatted.replace(/([spdf])(\d+)/gi, (match, p1, p2) => {
                let superscripts = p2.split('').map(d => map[d]).join('');
                return p1 + superscripts;
            });

            // 3. Reemplazar si hubo cambios manteniendo el cursor en su sitio
            if (val !== formatted) {
                const start = el.selectionStart;
                const end = el.selectionEnd;
                el.value = formatted;
                el.setSelectionRange(start, end);
            }
        };

                if (!isHomo) {
                    html += `

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-1 text-slate-800">

                                    <input type="number" id="unp2" value="${prev.unp2 || ''}" min="0" max="7" class="border border-emerald-300 rounded p-1 w-full text-center focus:ring-2 outline-none bg-white text-slate-800 text-xs">
                                </div>
                            </div>
                        </div>
                    `;
                }

                html += `<div class="sticky bottom-0 bg-white pt-2 pb-1"><button onclick="checkValence()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-1.5 rounded transition-colors font-sans shadow-md">Check Data</button></div></div>`;
                inputArea.innerHTML = html;

        }

        function getUnpairedSafe(el) {
            if (!el) return 0;
            if (typeof el.unpaired === 'number') return el.unpaired;
            // Seguridad para alcalinos ns¹: Li, Na, K, Rb, Cs, Fr.

        function checkValence() {
            const a1 = elementsDB[currentScenario.e1];
            const a2 = elementsDB[currentScenario.e2];
            const isHomo = currentScenario.e1 === currentScenario.e2;

            const rawP1 = document.getElementById('p1').value.trim();
            const rawG1 = document.getElementById('g1').value.trim();
            const rawConf1 = document.getElementById('conf1').value.trim();
            const rawV1 = document.getElementById('val1').value.trim();
            const rawUnp1 = document.getElementById('unp1').value.trim();

            const rawP2 = isHomo ? rawP1 : document.getElementById('p2').value.trim();
            const rawG2 = isHomo ? rawG1 : document.getElementById('g2').value.trim();
            const rawConf2 = isHomo ? rawConf1 : document.getElementById('conf2').value.trim();
            const rawV2 = isHomo ? rawV1 : document.getElementById('val2').value.trim();
            const rawUnp2 = isHomo ? rawUnp1 : document.getElementById('unp2').value.trim();

            if (!rawP1 || !rawG1 || !rawConf1 || !rawV1 || !rawUnp1 || (!isHomo && (!rawP2 || !rawG2 || !rawConf2 || !rawV2 || !rawUnp2))) {
                addTutorMessage("Please fill in all fields before checkinging the data.");
                return; 
            }

            currentStepAttempts++;

            const p1 = parseInt(rawP1) || 0;
            const g1 = parseInt(rawG1) || 0;
            const v1 = parseInt(rawV1) || 0;
            const unp1 = parseInt(rawUnp1) || 0;

            const p2 = isHomo ? p1 : (parseInt(rawP2) || 0);
            const g2 = isHomo ? g1 : (parseInt(rawG2) || 0);
            const v2 = isHomo ? v1 : (parseInt(rawV2) || 0);
            const unp2 = isHomo ? unp1 : (parseInt(rawUnp2) || 0);

            const cleanConf = (str) => {
                return str.toLowerCase().replace(/\s+/g, '')
                          .replace(/⁰/g, '0').replace(/¹/g, '1').replace(/²/g, '2').replace(/³/g, '3')
                          .replace(/⁴/g, '4').replace(/⁵/g, '5').replace(/⁶/g, '6').replace(/⁷/g, '7')
                          .replace(/⁸/g, '8').replace(/⁹/g, '9').replace(/\^/g, '');
            };
            
            const conf1 = cleanConf(rawConf1);
            const conf2 = cleanConf(rawConf2);
            const expectedConf1 = cleanConf(a1.conf);
            const expectedConf2 = cleanConf(a2.conf);

            inputArea.innerHTML = '';
            if (isHomo) {
                addUserMessage(`${a1.sym} -> P:${p1} | G:${g1} | Conf:${rawConf1} | Val:${v1} e⁻ | Unpaired:${unp1} e⁻`);
            } else {
                addUserMessage(`${a1.sym} -> P:${p1} | G:${g1} | Conf:${rawConf1} | Val:${v1} e⁻ | Unpaired:${unp1} e⁻`);
                addUserMessage(`${a2.sym} -> P:${p2} | G:${g2} | Conf:${rawConf2} | Val:${v2} e⁻ | Unpaired:${unp2} e⁻`);
            }

            safeSetTimeout(() => {
                let errors = [];
                let errA1 = [];
                let hasPeriodErr = false, hasGroupErr = false, hasConfErr = false, hasValErr = false, hasUnpErr = false;

                if (p1 !== a1.p) { errA1.push("period"); hasPeriodErr = true; }
                if (g1 !== a1.g) { errA1.push("group"); hasGroupErr = true; }
                if (conf1 !== expectedConf1) { errA1.push("orbital configuration"); hasConfErr = true; }
                if (v1 !== a1.val) { errA1.push("valence e⁻"); hasValErr = true; }
                if (unp1 !== getUnpairedSafe(a1)) { errA1.push("unpaired e⁻"); hasUnpErr = true; }
                if (errA1.length > 0) errors.push(`el <b class="text-red-600 font-bold">${a1.name}</b> (${errA1.join(', ')})`);

                if (!isHomo) {
                    let errA2 = [];
                    if (p2 !== a2.p) { errA2.push("period"); hasPeriodErr = true; }
                    if (g2 !== a2.g) { errA2.push("group"); hasGroupErr = true; }
                    if (conf2 !== expectedConf2) { errA2.push("orbital configuration"); hasConfErr = true; }
                    if (v2 !== a2.val) { errA2.push("valence e⁻"); hasValErr = true; }
                    if (unp2 !== getUnpairedSafe(a2)) { errA2.push("unpaired e⁻"); hasUnpErr = true; }
                    if (errA2.length > 0) errors.push(`el <b class="text-red-600 font-bold">${a2.name}</b> (${errA2.join(', ')})`);
                }

                if (errors.length === 0) {
                    addTutorMessage('<b class="text-red-600 font-bold">Excellent!</b> You have correctly deduced the periodic position, orbital configuration, and valence and spin properties.');
                    if (currentScenario.type === 'none') {
                        stepDetermineBond(); 
                    } else {
                        stepElectrons(a1, a2); 
                    }
                } else {
                    if (currentStepAttempts >= 3) {
                        if (isHomo) {
                            addTutorMessage(`You have used all 3 attempts. The correct data are:<br><div class="mt-1 space-y-1"><b class="text-red-600 font-bold block">${a1.sym}: P:${a1.p}, G:${a1.g}, Conf: ${a1.conf}, ${a1.val} valence e⁻, ${getUnpairedSafe(a1)} unpaired e⁻</b></div>`);
                        } else {
                            addTutorMessage(`You have used all 3 attempts. The correct data are:<br><div class="mt-1 space-y-1"><b class="text-red-600 font-bold block">${a1.sym}: P:${a1.p}, G:${a1.g}, Conf: ${a1.conf}, ${a1.val} valence e⁻, ${getUnpairedSafe(a1)} unpaired e⁻</b><b class="text-red-600 font-bold block mt-1">${a2.sym}: P:${a2.p}, G:${a2.g}, Conf: ${a2.conf}, ${a2.val} valence e⁻, ${getUnpairedSafe(a2)} unpaired e⁻</b></div>`);
                        }
                        showContinueButton(currentScenario.type === 'none' ? 'stepDetermineBond()' : 'stepElectrons(elementsDB[currentScenario.e1], elementsDB[currentScenario.e2])', 'Continue');
                        safeSetTimeout(() => {
                            if (inputArea && inputArea.querySelector('button')) return;
                            if (currentScenario.type === 'none') stepDetermineBond();
                            else stepElectrons(a1, a2);
                        }, 2500);
                    } else {
                        if (currentStepAttempts === 1) {
                            addTutorMessage(`Careful, there is an error in ${errors.join(' and ')}. Review the periodic table, Moeller/Aufbau filling order, and spin rules carefully.`);
                        } else {
                            let dynamicHints = [];
                            
                            if (hasPeriodErr) {
                                dynamicHints.push("• <b>Period:</b> The period (row number) corresponds to the highest occupied principal quantum number (n) in the electron configuration.");
                            }
                            if (hasGroupErr) {
                                dynamicHints.push("• <b>Group:</b> For the s and p blocks (representative elements), the group is related to the valence electrons: s block, g = valence e⁻; p block, g = 10 + valence e⁻, except helium, which is in group 18.");
                            }
                            if (hasConfErr) {
                                dynamicHints.push("• <b>Orbital configuration:</b> Make sure that the sum of all superscripts (electrons) exactly matches the atomic number Z. Fill orbitals in increasing energy order: 1s, 2s, 2p, 3s, 3p, 4s, 3d...");
                            }
                            if (hasValErr) {
                                dynamicHints.push("• <b>Valence e⁻:</b> Add only the electrons in the highest principal quantum level (n) that you have written.");
                            }
                            if (hasUnpErr) {
                                dynamicHints.push("• <b>Unpaired e⁻ (Hund):</b> Draw the orbital boxes of the last subshell: an s subshell has 1 orbital and a p subshell has 3 orbitals. Distribute the electrons one by one with parallel spins before pairing them.");
                            }

                            addTutorMessage(`There is an error en ${errors.join(' and ')}. <br><br><b>Tutor hints:</b> <br>${dynamicHints.join('<br>')}`);
                        }
                        
                        stepValence(a1, a2, { p1: rawP1, g1: rawG1, conf1: rawConf1, v1: rawV1, unp1: rawUnp1, p2: rawP2, g2: rawG2, conf2: rawConf2, v2: rawV2, unp2: rawUnp2 });
                    }
                }
            }, 800);
        }

        // --- DETERMINE VALENCE ELECTRON CHANGES ---
        function stepElectrons(a1, a2, prev = {}) {
            if(Object.keys(prev).length === 0) currentStepAttempts = 0;
            const isHomo = currentScenario.e1 === currentScenario.e2;

            safeSetTimeout(() => {
                if (currentStepAttempts === 0) {
                    if (isHomo) {
                        addTutorMessage(`Applying the <b>Octet Rule (or Duet Rule)</b> to become stable, what does the element need to do with its valence electrons?`);
                    } else {
                        addTutorMessage(`Applying the <b>Octet Rule (or Duet Rule)</b> to become stable, what does each atom need to do with its valence electrons?`);
                    }
                }
                
                let html = `<div class="flex flex-col space-y-1 fade-in text-sm font-sans text-slate-800">`;
                
                html += `
                    <div class="bg-slate-50 p-3 rounded border border-slate-200">
                        <div class="flex items-center gap-1.5 mb-1.5">
                            <span class="font-bold text-indigo-700 w-8">${a1.sym}:</span>
                            <select id="action1" class="border border-slate-300 rounded p-1 flex-1 focus:ring-2 outline-none bg-white text-slate-800">
                                <option value="">Select...</option>
                                <option value="loses" ${prev.a1 === 'loses' ? 'selected' : ''}>Loses</option>
                                <option value="gains" ${prev.a1 === 'gains' ? 'selected' : ''}>Gains</option>
                                <option value="shares" ${prev.a1 === 'shares' ? 'selected' : ''}>Shares</option>
                            </select>
                            <input type="number" id="ecount1" value="${prev.c1 || ''}" min="1" max="8" class="border border-slate-300 rounded p-1 w-12 text-center focus:ring-2 outline-none bg-white text-slate-800">
                            <span class="text-slate-600 font-semibold">e⁻</span>
                        </div>
                `;

                if (!isHomo) {
                    html += `
                        <div class="flex items-center gap-1.5">
                            <span class="font-bold text-teal-700 w-8">${a2.sym}:</span>
                            <select id="action2" class="border border-slate-300 rounded p-1 flex-1 focus:ring-2 outline-none bg-white text-slate-800">
                                <option value="">Select...</option>
                                <option value="loses" ${prev.a2 === 'loses' ? 'selected' : ''}>Loses</option>
                                <option value="gains" ${prev.a2 === 'gains' ? 'selected' : ''}>Gains</option>
                                <option value="shares" ${prev.a2 === 'shares' ? 'selected' : ''}>Shares</option>
                            </select>
                            <input type="number" id="ecount2" value="${prev.c2 || ''}" min="1" max="8" class="border border-slate-300 rounded p-1 w-12 text-center focus:ring-2 outline-none bg-white text-slate-800">
                            <span class="text-slate-600 font-semibold">e⁻</span>
                        </div>
                    `;
                }

                html += `</div>
                    <button onclick="checkElectrons()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-1.5 rounded mt-1 transition-colors font-sans">Check Stability</button>
                </div>`;
                
                inputArea.innerHTML = html;
            }, 1000);
        }

        function checkElectrons() {
            currentStepAttempts++;
            const a1 = elementsDB[currentScenario.e1];
            const a2 = elementsDB[currentScenario.e2];
            const isIonic = currentScenario.type === 'ionic';
            const isMetallic = currentScenario.type === 'metallic';
            const isHomo = currentScenario.e1 === currentScenario.e2;

            const action1 = document.getElementById('action1').value;
            const ecount1 = parseInt(document.getElementById('ecount1').value) || 0;
            
            const action2 = isHomo ? action1 : document.getElementById('action2').value;
            const ecount2 = isHomo ? ecount1 : (parseInt(document.getElementById('ecount2').value) || 0);

            inputArea.innerHTML = '';
            if (isHomo) {
                addUserMessage(`${a1.sym}: ${action1 || '?'} ${ecount1} e⁻`);
            } else {
                addUserMessage(`${a1.sym}: ${action1 || '?'} ${ecount1} e⁻ | ${a2.sym}: ${action2 || '?'} ${ecount2} e⁻`);
            }

            const expected1 = {
                action: (isIonic || isMetallic) ? (a1.type === 'metal' ? 'loses' : 'gains') : 'shares',
                count: a1.type === 'metal' ? a1.val : (a1.sym === 'H' ? 1 : (8 - a1.val))
            };
            const expected2 = {
                action: (isIonic || isMetallic) ? (a2.type === 'metal' ? 'loses' : 'gains') : 'shares',
                count: a2.type === 'metal' ? a2.val : (a2.sym === 'H' ? 1 : (8 - a2.val))
            };

            const verbMap = { 'loses': 'lose', 'gains': 'gain', 'shares': 'share' };

            safeSetTimeout(() => {
                let errors = [];
                if (action1 !== expected1.action || ecount1 !== expected1.count) errors.push(`what happens to <b>${a1.sym}</b>`);
                if (!isHomo && (action2 !== expected2.action || ecount2 !== expected2.count)) errors.push(`what happens to <b>${a2.sym}</b>`);

                if (errors.length === 0) {
                    if (isIonic) {
                        addTutorMessage(`<b class="text-red-600 font-bold">Very good!</b> In this ionic bond, the metal gives up its electrons to form cations, and the nonmetal gains them to form stable anions.`);
                        stepBuildIons(a1, a2);
                    } else if (isMetallic) {
                        addTutorMessage(`<b class="text-red-600 font-bold">Very good!</b> In metallic bonding, the metal cations remain strongly held together thanks to delocalized electrons.`);
                        stepBuildIons(a1, a2);
                    } else {
                        if (isHomo) {
                            addTutorMessage(`<b class="text-red-600 font-bold">Exactly!</b> Because they are nonmetal atoms, they share their valence electrons to complete their outer shells.`);
                        } else {
                            addTutorMessage(`<b class="text-red-600 font-bold">Exactly!</b> Since both are nonmetals, share valence electrons to complete the octet (o duet).`);
                        }
                        stepAtomsBalance(a1, a2);
                    }
                } else {
                    if (currentStepAttempts >= 3) {
                        if (isHomo) {
                            addTutorMessage(`You have used all 3 attempts. The correct deduction is:<br><div class="mt-1 space-y-1"><div>El <b>${a1.sym}</b> needs <b class="text-red-600 font-bold">${verbMap[expected1.action]} ${expected1.count} e⁻</b>.</div></div>`);
                        } else {
                            addTutorMessage(`You have used all 3 attempts. The correct deduction is:<br><div class="mt-1 space-y-1"><div>El <b>${a1.sym}</b> needs <b class="text-red-600 font-bold">${verbMap[expected1.action]} ${expected1.count} e⁻</b>.</div><div>El <b>${a2.sym}</b> needs <b class="text-red-600 font-bold">${verbMap[expected2.action]} ${expected2.count} e⁻</b>.</div></div>`);
                        }
                        safeSetTimeout(() => {
                            if (isIonic || isMetallic) stepBuildIons(a1, a2);
                            else stepAtomsBalance(a1, a2);
                        }, 2500);
                    } else {
                        let hint = "";
                        
                        // Evaluar de forma diferenciada la naturaleza de los errores
                        const isAct1Wrong = action1 !== expected1.action;
                        const isQty1Wrong = action1 === expected1.action && ecount1 !== expected1.count;
                        const isAct2Wrong = !isHomo && (action2 !== expected2.action);
                        const isQty2Wrong = !isHomo && (action2 === expected2.action && ecount2 !== expected2.count);

                        const hasActionError = isAct1Wrong || isAct2Wrong;
                        const hasOnlyQtyError = !hasActionError && (isQty1Wrong || isQty2Wrong);

                        if (currentStepAttempts === 1) {
                            if (hasActionError) {
                                hint = "Review whether the selected action (lose, gain, or share) is correct according to whether the element is a metal or a nonmetal, and the bond type involved.";
                            } else if (hasOnlyQtyError) {
                                hint = "You got the behavior right (lose/gain/share), but the number of electrons is not correct. Review the valence electrons each element has in its outer shell and how many it needs to complete it.";
                            }
                        } else {
                            // Segundo intento
                            if (hasActionError) {
                                hint = (isIonic || isMetallic) ? 
                                    "Remember: in ionic or metallic bonds, metals always <b>lose</b> their valence electrons, while nonmetals <b>gain</b> them to become stable." :
                                    "Remember: in covalent bonds, nonmetals <b>share</b> electrons to complete their outer shells together.";
                            } else if (hasOnlyQtyError) {
                                let specificTips = [];
                                if (isQty1Wrong) {
                                    if (a1.type === 'metal') {
                                        specificTips.push(`The metal <b>${a1.sym}</b> must lose exactly <b>all</b> its valence electrons (es decir, ${expected1.count} e⁻).`);
                                    } else {
                                        specificTips.push(`El nonmetal <b>${a1.sym}</b> debe gain o share la amount exacta de necessary electrons para llegar a 8 (o a 2 in caso del H, Li o Be).`);
                                    }
                                }
                                if (isQty2Wrong) {
                                    if (a2.type === 'metal') {
                                        specificTips.push(`El metal <b>${a2.sym}</b> debe lose exactamente <b>todos</b> sus valence electrons (es decir, ${expected2.count} e⁻).`);
                                    } else {
                                        specificTips.push(`El nonmetal <b>${a2.sym}</b> debe gain o share la amount exacta de necessary electrons para llegar a 8 (o a 2 in caso del H, Li o Be).`);
                                    }
                                }
                                hint = `<b>Counting hint:</b><br>${specificTips.join('<br>')}`;
                            }
                        }
                        
                        addTutorMessage(`There is a detail to review in ${errors.join(' and ')}. <br><br>${hint}`);
                        stepElectrons(a1, a2, {a1: action1, c1: ecount1, a2: action2, c2: ecount2});
                    }
                }
            }, 800);
        }

        // --- ION CONSTRUCTION (IONIC / METALLIC ONLY) ---
        function stepBuildIons(a1, a2, isRetry = false) {
            if (!isRetry) currentStepAttempts = 0;
            const isMetallic = currentScenario.type === 'metallic';
            
            safeSetTimeout(() => {
                if (!isRetry) {
                    if (isMetallic) {
                        addTutorMessage("Now we are going to build the resulting cation. Write the charge del ion como superscript usando las two boxes.");
                    } else {
                        addTutorMessage("Now we are going to build the resulting ions. Write the charge of each ion as a superscript using the two boxes.");
                    }
                }

                let html = `
                    <div class="flex flex-col space-y-4 fade-in font-sans text-slate-800">
                        <div class="flex justify-around items-center bg-slate-50 p-6 rounded border border-slate-200">
                            <!-- Ión 1 -->
                            <div class="flex items-start text-4xl font-bold font-serif text-indigo-700 relative">
                                <span>${a1.sym}</span>
                                <div class="flex absolute -right-12 -top-2">
                                    <input type="text" id="i1_b1" maxlength="1" class="w-6 h-6 text-sm text-center border border-slate-400 rounded-l focus:outline-none focus:ring-2 focus:ring-indigo-500 font-sans text-slate-800 bg-white">
                                    <input type="text" id="i1_b2" maxlength="1" class="w-6 h-6 text-sm text-center border-y border-r border-slate-400 rounded-r focus:outline-none focus:ring-2 focus:ring-indigo-500 font-sans text-slate-800 bg-white">
                                </div>
                            </div>`;
                            
                if (!isMetallic) {
                    html += `
                            <!-- Ión 2 -->
                            <div class="flex items-start text-4xl font-bold font-serif text-teal-700 relative ml-8">
                                <span>${a2.sym}</span>
                                <div class="flex absolute -right-12 -top-2">
                                    <input type="text" id="i2_b1" maxlength="1" class="w-6 h-6 text-sm text-center border border-slate-400 rounded-l focus:outline-none focus:ring-2 focus:ring-teal-500 font-sans text-slate-800 bg-white">
                                    <input type="text" id="i2_b2" maxlength="1" class="w-6 h-6 text-sm text-center border-y border-r border-slate-400 rounded-r focus:outline-none focus:ring-2 focus:ring-teal-500 font-sans text-slate-800 bg-white">
                                </div>
                            </div>`;
                }

                html += `
                        </div>
                        <button onclick="checkBuildIons()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-1.5 rounded transition-colors font-sans">Form Ions</button>
                    </div>
                `;
                inputArea.innerHTML = html;
            }, isRetry ? 100 : 1000);
        }

        function checkBuildIons() {
            currentStepAttempts++;
            const a1 = elementsDB[currentScenario.e1];
            const a2 = elementsDB[currentScenario.e2];
            const isMetallic = currentScenario.type === 'metallic';
            
            const i1b1 = document.getElementById('i1_b1').value.trim();
            const i1b2 = document.getElementById('i1_b2').value.trim();
            const i2b1 = isMetallic ? '' : document.getElementById('i2_b1').value.trim();
            const i2b2 = isMetallic ? '' : document.getElementById('i2_b2').value.trim();

            inputArea.innerHTML = '';
            if (isMetallic) {
                addUserMessage(`${a1.sym}<sup>${i1b1}${i1b2}</sup>`);
            } else {
                addUserMessage(`${a1.sym}<sup>${i1b1}${i1b2}</sup> and ${a2.sym}<sup>${i2b1}${i2b2}</sup>`);
            }

            const expectedCharge1 = a1.val; 
            const expectedCharge2 = isMetallic ? 0 : (a2.sym === 'H' ? 1 : 8 - a2.val); 
            
            const validateIon = (b1, b2, charge, sign) => {
                if (charge === 1) {
                    if ((b1 === sign && b2 === '') || (b1 === '' && b2 === sign)) return {ok: true};
                    if (b1 === '1' || b2 === '1') return {ok: false, hint: 'number1'};
                    return {ok: false, hint: 'wrong_sign'};
                } else {
                    if (b1 === charge.toString() && b2 === sign) return {ok: true};
                    if (b1 === sign && b2 === charge.toString()) return {ok: false, hint: 'reversed'};
                    return {ok: false, hint: 'wrong_val'};
                }
            };

            const res1 = validateIon(i1b1, i1b2, expectedCharge1, '+');
            const res2 = isMetallic ? {ok: true} : validateIon(i2b1, i2b2, expectedCharge2, '-');

            safeSetTimeout(() => {
                if (res1.ok && res2.ok) {
                    if (isMetallic) {
                        addTutorMessage(`<b class="text-red-600 font-bold">Perfect!</b> You have built the metallic cation correctly: <b class="text-red-600 font-bold">${a1.sym}<sup>${expectedCharge1===1?'+':expectedCharge1+'+'}</sup></b>.`);
                        stepMetallicExplanation();
                    } else {
                        addTutorMessage(`<b class="text-red-600 font-bold">Perfect!</b> You have built the ions correctly: <b class="text-red-600 font-bold">${a1.sym}<sup>${expectedCharge1===1?'+':expectedCharge1+'+'}</sup></b> and <b class="text-red-600 font-bold">${a2.sym}<sup>${expectedCharge2===1?'-':expectedCharge2+'-'}</sup></b>.`);
                        stepAtomsBalance(a1, a2);
                    }
                } else {
                    if (currentStepAttempts >= 3) {
                        let expected1 = expectedCharge1 === 1 ? '+' : `${expectedCharge1}+`;
                        if (isMetallic) {
                            addTutorMessage(`You have used all 3 attempts. El cation correcto es <b class="text-red-600 font-bold">${a1.sym}<sup>${expected1}</sup></b>.`);
                            safeSetTimeout(() => stepMetallicExplanation(), 2500);
                        } else {
                            let expected2 = expectedCharge2 === 1 ? '-' : `${expectedCharge2}-`;
                            addTutorMessage(`You have used all 3 attempts. The correct ions are <b class="text-red-600 font-bold">${a1.sym}<sup>${expected1}</sup></b> and <b class="text-red-600 font-bold">${a2.sym}<sup>${expected2}</sup></b>.`);
                            safeSetTimeout(() => stepAtomsBalance(a1, a2), 2500);
                        }
                    } else {
                        let errorMsg = "Look carefully, there is a detail to adjust in the cation:";
                        
                        const generateHint = (atom, res, isMetal) => {
                            if (res.ok) return "";
                            let hint = `<br>• <b>${atom.sym}:</b> `;
                            if (res.hint === 'number1') {
                                if (currentStepAttempts === 1) hint += "Review how you wrote the charge. There is a chemical convention about whether the number '1' should be written or omitted.";
                                else hint += "Think about chemical notation conventions: do we usually write the number '1' explicitly, or is it understood?";
                            } else if (res.hint === 'reversed') {
                                if (currentStepAttempts === 1) hint += "The charge value is correct, but there is a formatting error. Review the order.";
                                else hint += "The numerical value is correct, but review the writing order. IUPAC indicates that the number comes first and then the mathematical sign.";
                            } else {
                                const action = isMetal ? 'loses' : 'gains';

                            } else if (caseError) {

                            } else if (isOrderReversed) {

                            } else if (areQtysWrong) {
                                hint = "<b>Proportion error:</b> You have not balanced the amounts of atoms correctly.";

                                } else if (isCovalentAtomic && isHomo) {

                                } else if (isCovalentAtomic && !isHomo) {

        // --- CONSTRUCTOR INTERACTIVO DE LEWIS ---
        function startInteractiveLewis(displayForm) {
            currentStepAttempts = 0;
            safeSetTimeout(() => {
                if (currentScenario.type === 'covalent_atomic') {
                    if ((currentScenario.form || '') === 'SiO2') {
                        addTutorMessage(`Since it is a <b>covalent giant network</b>, build the <b>tetrahedral local unit</b> on the work board: a central <b>Si</b> bonded to <b>4 O atoms</b>.<br><br><b>Important:</b> each <b>O</b> is a <b>bridging oxygen</b>, so in addition to bonding to the central Si it will remain connected to <b>another Si</b> in the network. Therefore, the local unit looks like <b>SiO<sub>4</sub></b>, but the <b>overall formula</b> remains <b>SiO<sub>2</sub></b> (<b>SiO<sub>4</sub>/2 = SiO<sub>2</sub></b>).`);
                    } else if ((currentScenario.form || '') === 'SiC') {
                        addTutorMessage(`<b>Carborundum (SiC)</b> is a <b>covalent giant network</b> of the <b>diamond / zinc blende</b> type. Build a <b>tetrahedral local unit</b>: a central <b>Si</b> bonded to <b>4 C atoms</b>.<br><br>Remember that in the real lattice each <b>C</b> will remain bonded to other <b>Si</b> atoms, so the <b>overall proportion</b> remains <b>SiC</b>.`);
                    } else if ((currentScenario.form || '') === 'C3N4') {
                        addTutorMessage(`We work with a didactic model of <b>dense/superhard 3D C<sub>3</sub>N<sub>4</sub></b>. Build a <b>local unit</b> with a central <b>C</b> atom, <b>tetrahedral (sp<sup>3</sup>)</b>, bonded to <b>4 N atoms</b>.<br><br>In the 3D lattice, each <b>N</b> should be understood as a <b>three-coordinated</b> atom, bonded to <b>3 C</b>. Para simplificar el modelo tridimensional, <b>no representamos pares de electrons libres</b>. Therefore la <b>local unit</b> no coincide exactamente con la <b>overall formula</b>, que remains <b>C<sub>3</sub>N<sub>4</sub></b>.`);
                    } else {
                        addTutorMessage(`Since it is una <b>covalent giant network</b>, build the <b>basic structural unit</b> (the central nucleus surrounded by its immediate neighbors) on the work board.<br><br><b>Note:</b> Since the peripheral atoms will connect to others in the network, <b>leave them only with the electrons and bonds strictly necessary for this unit</b> (do not try to complete their octet with invented lone pairs).`);
                    }
                } else {
                    addTutorMessage(`Since it is a covalent bond, <b>build its Lewis structure</b> on the work board so that all atoms satisfy the octet rule (or duet rule).`);
                }
                
                const b = currentScenario.builder;
                builderState.allAtoms = [];
                let aId = 0;
                builderState.allAtoms.push({ id: `a${aId++}`, sym: b.center });
                b.periph.forEach(sym => { builderState.allAtoms.push({ id: `a${aId++}`, sym: sym }); });
                
                builderState.inventory = [...builderState.allAtoms];
                builderState.placed = { center: null, 0: null, 1: null, 2: null, 3: null };
                builderState.bonds = [0, 0, 0, 0];
                builderState.lp = { center: 0, 0: 0, 1: 0, 2: 0, 3: 0 };
                
                renderBuilderUI();

                inputArea.innerHTML = `
                    <div class="flex flex-col fade-in">
                        <button onclick="checkInteractiveLewis('${displayForm}')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1.5 rounded shadow-md transition-colors font-sans">Check my structure</button>

        }

        function checkInteractiveLewis(displayForm) {
            currentStepAttempts++;
            const b = currentScenario.builder;
            const isDiatomic = b.periph.length === 1;
            
            if (builderState.inventory.length > 0) {
                addTutorMessage("Aún hass atoms in inventario! Arrástralos todos a la cuadrícula.");
                return;
            }

            const cPlaced = builderState.placed['center'];
            if (!cPlaced) {
                addTutorMessage("Te falta colocar an atom in slot central de la cuadrícula.");
                return;
            }
            if (!isDiatomic && cPlaced.sym !== b.center) {
                if(currentStepAttempts >= 3) {
                    addTutorMessage("You have used all 3 attempts. Te muestro the Lewis structure correcta.");
                    autoSolveLewis(); freezeLewisBoard();
                    safeSetTimeout(() => stepMassCalculation(currentScenario.c1, currentScenario.c2), 3000);
                    return;
                }
                addTutorMessage(`El atom que has puesto in centro (${cPlaced.sym}) no es el correcto. Remember that suele ser el que puede formar más bonds.`);
                return;
            }

            let missingBonds = false; let wrongBonds = false; let bondsToVoid = false; let bondSum = 0;
            let wrongLp = false;
            let totalLp = builderState.lp['center'];
            
            if (builderState.lp['center'] !== b.expectedLp.center) wrongLp = true;

            if (isDiatomic) {
                let pSlot = -1;
                for (let i = 0; i < 4; i++) {
                    if (builderState.placed[i] !== null) pSlot = i;
                }
                
                if (pSlot === -1) {
                    addTutorMessage("Te falta colocar el otro atom en uno de los slots peripheral.");
                    return;
                }
                
                const bondLvl = builderState.bonds[pSlot];
                if (bondLvl === 0) missingBonds = true;
                else if (bondLvl !== b.expectedBondLevel) wrongBonds = true;
                bondSum += bondLvl;
                
                for (let i = 0; i < 4; i++) {
                    if (i !== pSlot && builderState.bonds[i] > 0) bondsToVoid = true;
                }
                
                totalLp += builderState.lp[pSlot];
                if (builderState.lp[pSlot] !== b.expectedLp.periph[0]) wrongLp = true;
                
            } else {
                // Orientation-independent Lewis evaluation:
                // top / left / right / bottom positions are equivalent if the atom set,
                // the bond orders, and the lone pairs are chemically correct.
                const occupiedSlots = [];
                for (let i = 0; i < 4; i++) {
                    const atomObj = builderState.placed[i];
                    const bondLvl = builderState.bonds[i];
                    if (atomObj) {
                        occupiedSlots.push(i);
                        if (bondLvl === 0) missingBonds = true;
                        else if (bondLvl !== b.expectedBondLevel) wrongBonds = true;
                        bondSum += bondLvl;
                    } else if (bondLvl > 0) {
                        bondsToVoid = true;
                    }
                }

                const expectedPeriph = Array.isArray(b.periph) ? [...b.periph] : [];
                if (occupiedSlots.length !== expectedPeriph.length) {
                    missingBonds = true;
                }

                const usedExpected = new Set();
                for (const slot of occupiedSlots) {
                    const placedSym = builderState.placed[slot]?.sym;
                    let expectedIdx = -1;
                    for (let j = 0; j < expectedPeriph.length; j++) {
                        if (!usedExpected.has(j) && expectedPeriph[j] === placedSym) {
                            expectedIdx = j;
                            break;
                        }
                    }

                    if (expectedIdx === -1) {
                        wrongBonds = true;
                        totalLp += builderState.lp[slot] || 0;
                        continue;
                    }

                    usedExpected.add(expectedIdx);
                    totalLp += builderState.lp[slot] || 0;
                    const expectedLpForThisAtom = b.expectedLp.periph[expectedIdx] ?? 0;
                    if ((builderState.lp[slot] || 0) !== expectedLpForThisAtom) wrongLp = true;
                }

                if (usedExpected.size !== expectedPeriph.length) {
                    missingBonds = true;
                }
            }

            let errors = [];
            if (bondsToVoid) errors.push("bonds que no apuntan a ningún atom");
            else if (missingBonds) errors.push("bonds que faltan por trazar");
            else if (wrongBonds) errors.push("type of bonds (elemental/dobles)");
            if (wrongLp) errors.push("lone pairs en the atoms");

            inputArea.innerHTML = '';
            addUserMessage(`Proposed structure: ${bondSum} bonds and ${totalLp} lone pairs.`);

            safeSetTimeout(() => {
                if(errors.length === 0) {
                    let msg = `<b class="text-red-600 font-bold">Brilliant!</b> You have built the Lewis structure perfectly.`;
                    if (currentScenario.type === 'covalent_atomic') {
                        msg += ` <br><br>Al ser una giant lattice, imagina que de the atoms peripheral salen más bonds hacia otros atoms, extending infinitely in three dimensions.`;
                        if ((currentScenario.form || '') === 'SiO2') {
                            msg += ` <br><br>In <b>SiO<sub>2</sub></b>, the local unit is <b>SiO<sub>4</sub></b>, but each oxygen is shared with <b>another Si</b>. Therefore, the overall ratio is <b>SiO<sub>4</sub>/2 = SiO<sub>2</sub></b>.`;
                        }
                    } else {
                        msg += " The shared and lone pairs are clearly visible.";
                    }
                    addTutorMessage(msg);
                    freezeLewisBoard();
                    stepMassCalculation(currentScenario.c1, currentScenario.c2);
                } else {
                    if(currentStepAttempts >= 3) {
                        addTutorMessage("You have used all 3 attempts. I have generated the correct Lewis structure on the work board.");
                        autoSolveLewis(); freezeLewisBoard();
                        safeSetTimeout(() => stepMassCalculation(currentScenario.c1, currentScenario.c2), 3000);
                    } else {
                        let hint = "Review bien si todos the atoms cumplin octet (o duet). Cuenta the electrons que aporta cada bond and those it quedan libres.";
                        addTutorMessage(`Mmm, hay algo que ajustar en los <b>${errors.join(" and ")}</b>. <br><br>${hint}`);
                        safeSetTimeout(() => {
                            inputArea.innerHTML = `
                                <div class="flex flex-col fade-in">
                                    <button onclick="checkInteractiveLewis('${displayForm}')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1.5 rounded shadow-md transition-colors font-sans font-sans">Volver a evaluar</button>
                                </div>
                            `;
                        }, 500);
                    }
                }
            }, 800);
        }

        function drawLp(lpCount, pos, forStatic = false) {
            if (lpCount === 0) return '';
            
            let available = [];
            if (pos === 'center') {
                available = ['top', 'bottom', 'left', 'right'];
                if (builderState.placed[0]) available = available.filter(s => s !== 'left');
                if (builderState.placed[1]) available = available.filter(s => s !== 'right');
                if (builderState.placed[2]) available = available.filter(s => s !== 'bottom');
                if (builderState.placed[3]) available = available.filter(s => s !== 'top');
            } else if (pos == 0) { available = ['top', 'bottom', 'left']; }
              else if (pos == 1) { available = ['top', 'bottom', 'right']; }
              else if (pos == 2) { available = ['bottom', 'left', 'right']; }
              else if (pos == 3) { available = ['top', 'left', 'right']; }

            let html = '';
            const styles = {
                'top': 'top: -4px; left: 50%; transform: translateX(-50%);',
                'bottom': 'bottom: -4px; left: 50%; transform: translateX(-50%);',

                'right': 'right: -4px; top: 50%; transform: translateY(-50%) rotate(90deg);'
            };

            const fallbackSlots = ['top', 'bottom', 'left', 'right'];

            for (let i = 0; i < lpCount; i++) {
                let slot = available[i];
                if (!slot) {
                    const centerDir = pos == 0 ? 'right' : pos == 1 ? 'left' : pos == 2 ? 'top' : pos == 3 ? 'bottom' : '';
                    slot = fallbackSlots.find(s => !available.includes(s) && s !== centerDir);

        function autoSolveLewis() {
            const b = currentScenario.builder;
            builderState.inventory = [];
            builderState.bonds = [0,0,0,0];
            builderState.lp = { center: b.expectedLp.center, 0: 0, 1: 0, 2: 0, 3: 0 };
            builderState.placed = { center: null, 0: null, 1: null, 2: null, 3: null };

            let unusedAtoms = [...builderState.allAtoms];
            let centerIdx = unusedAtoms.findIndex(a => a.sym === b.center);
            builderState.placed['center'] = unusedAtoms.splice(centerIdx, 1)[0];

            for (let i = 0; i < b.periph.length; i++) {
                let pIdx = unusedAtoms.findIndex(a => a.sym === b.periph[i]);
                let slotIdx = (b.periph.length === 1) ? 1 : i;
                builderState.placed[slotIdx] = unusedAtoms.splice(pIdx, 1)[0];
                builderState.bonds[slotIdx] = b.expectedBondLevel;
                builderState.lp[slotIdx] = b.expectedLp.periph[i];
            }
            renderBuilderUI();
        }

            const n = m[1];
            const sign = m[2];
            return `<sup>${n}${sign}</sup>`;

        }

                        <div class="mt-1">Didactically, the local unit does not exactly match the overall formula. The important idea is to understand that the network extends in 3D and that the total proportion remains <b>C<sub>3</sub>N<sub>4</sub></b>.</div>

        const electronegativityDB = { H: 2.20, C: 2.55, N: 3.04, O: 3.44, F: 3.98, Si: 1.90, P: 2.19, S: 2.58, Cl: 3.16, Br: 2.96, I: 2.66 };

        function isWeakPolarException(symA, symB) {
            const pair = [symA, symB].sort().join('-');
            return pair === 'H-P';
        }

        function isBondConsideredPolar(symA, symB) {
            if (!symA || !symB || symA === symB) return false;
            const diff = Math.abs((electronegativityDB[symA] || 0) - (electronegativityDB[symB] || 0));
            // Some bonds con small electronegativity difference are treated as
            // weakly polar in simulador to reason about dipoles and geometry.
            // En molecules symmetric, the molecule may be nonpolar by vector cancellation.
            if ((symA === 'C' && symB === 'H') || (symA === 'H' && symB === 'C')) return true;
            if ((symA === 'C' && symB === 'I') || (symA === 'I' && symB === 'C')) return true;
            if (isWeakPolarException(symA, symB)) return true;
            // Didactic threshold: N-Cl, N-Br and other slightly polar heteronuclear bonds
            // should be treated as polar when the molecular geometry does not cancel them.
            return diff >= 0.05;
        }

        function getBondDipoleSense(symA, symB) {
            const enA = electronegativityDB[symA] || 0;
            const enB = electronegativityDB[symB] || 0;
            return enB >= enA ? 'A_to_B' : 'B_to_A';
        }

        function renderLewisStructureOnStage() {
            if (!currentScenario || !currentScenario.builder || !stageContent) return;
