            const phase = getMolecularPhysicalStateRT(currentScenario);
            state.molecularPhase = phase;
            addMolecularStateContainer(state, phase);
            const maxMolecularAtomRadius = Math.max(getCPKAtomStyle(center).radius, getCPKAtomStyle(periph).radius);
            const isLargeSolidDiatomic = phase === 'solid' && kind === 'diatomic' && maxMolecularAtomRadius >= 1.15;

            let placements = [];
            let count = 0;
            if (phase === 'gas') {
                if (kind === 'diatomic') {
                    placements = [
                        [-7.6, 4.0, 1.0], [-6.2, 1.4, -4.8], [-5.0, -3.2, 4.4],
                        [-3.5, 4.8, 3.2], [-2.2, -1.6, 5.6], [-0.6, 2.0, -5.2],
                        [1.1, -4.2, -1.8], [2.8, 4.5, 4.3], [4.4, -2.8, -4.2],
                        [5.9, 2.9, -2.8], [7.2, -1.0, 2.4], [6.6, -4.3, 5.0],
                        [0.3, 5.4, 0.8], [-7.0, -0.5, -0.8]
                    ];
                } else {
                    placements = [
                        [-7.0, 3.4, 0.8], [-5.9, -2.6, -4.6], [-4.0, 5.0, 3.6],
                        [-2.5, -4.2, 3.1], [-1.0, 1.6, -5.5], [0.8, 5.1, 5.0],
                        [2.0, -3.6, -1.9], [3.8, 3.7, 4.4], [5.2, -2.4, -4.9],
                        [6.8, 0.0, 2.9], [0.0, -0.8, 0.0]
                    ];
                }
                count = placements.length;
                state.boundingBox = 11.5;
            } else if (phase === 'liquid') {
                count = currentScenario.form === 'H2O' ? 34 : 24;
                const radius = 7.0, yMin = -4.0, yMax = 3.5;
                for (let i = 0; i < count; i++) {
                    const rr = Math.sqrt(Math.random()) * radius;
                    const th = Math.random() * Math.PI * 2;
                    placements.push([rr*Math.cos(th), yMin + Math.random()*(yMax-yMin), rr*Math.sin(th)]);
                }
                state.boundingBox = 8.0;
            } else {
                const xs = isLargeSolidDiatomic ? [-4.6, 0, 4.6] : [-5.2, 0, 5.2];
                const ys = isLargeSolidDiatomic ? [-3.3, 1.0, 5.3] : [-3.8, 1.2, 6.0];
                const zs = isLargeSolidDiatomic ? [-3.8, 0.8, 4.4] : [-4.3, 1.0, 5.2];
                xs.forEach(x => ys.forEach(y => zs.forEach(z => {
                    if (placements.length < 18) placements.push([x, y - (isLargeSolidDiatomic ? 1.3 : 1.8), z]);
                })));
                count = placements.length;
                state.boundingBox = isLargeSolidDiatomic ? 9.8 : 8.6;
            }

            placements.forEach((p, i) => {
                const m = makeSpaceFillingMoleculeGroup(kind, center, periph);
                const scale = getCompactMolecule3DScale(currentScenario.form, kind, phase, maxMolecularAtomRadius);
                m.scale.setScalar(scale);
                m.position.set(...p);
                m.rotation.set(Math.random()*Math.PI*2, Math.random()*Math.PI*2, Math.random()*Math.PI*2);
                state.root.add(m);

                let velocityScale = phase === 'gas' ? 0.08 : (phase === 'liquid' ? 0.035 : 0.004);
                state.molecules.push({
                    mesh: m,
                    basePos: new THREE.Vector3(...p),
                    phase: Math.random()*Math.PI*2,
                    speed: phase === 'solid' ? 0.002 : 0.012 + Math.random()*0.010,
                    phaseState: phase,
                    velocity: new THREE.Vector3(
                        (Math.random()-0.5)*velocityScale,
                        (Math.random()-0.5)*velocityScale,
                        (Math.random()-0.5)*velocityScale
                    ),
                    rotVelocity: new THREE.Vector3(
                        (Math.random()-0.5)*velocityScale*0.65,
                        (Math.random()-0.5)*velocityScale*0.65,
                        (Math.random()-0.5)*velocityScale*0.65
                    )
                });
            });
        }


        function animateMicro3D() {
            const state = window.__micro3dSceneState;
            if (!state) return;
            window.__micro3dAnimationId = requestAnimationFrame(animateMicro3D);
            const t = performance.now() * 0.001;

            state.ions.forEach(obj => {
                const amp = 0.12;
                obj.mesh.position.x = obj.basePos.x + Math.sin(t * 4 + obj.phase) * amp;
                obj.mesh.position.y = obj.basePos.y + Math.cos(t * 4.4 + obj.phase) * amp;
                obj.mesh.position.z = obj.basePos.z + Math.sin(t * 3.7 + obj.phase) * amp;
            });
            state.atoms.forEach(obj => {
                const amp = 0.045;
                obj.mesh.position.x = obj.basePos.x + Math.sin(t * 3 + obj.phase) * amp;
                obj.mesh.position.y = obj.basePos.y + Math.cos(t * 3.3 + obj.phase) * amp;
                obj.mesh.position.z = obj.basePos.z + Math.sin(t * 2.8 + obj.phase) * amp;
            });
            state.molecules.forEach(obj => {
                if (obj.phaseState === 'gas') {
                    obj.mesh.position.add(obj.velocity);
                    obj.mesh.rotation.x += obj.rotVelocity.x;
                    obj.mesh.rotation.y += obj.rotVelocity.y;
                    obj.mesh.rotation.z += obj.rotVelocity.z;
                    ['x','y','z'].forEach(axis => {
                        if (Math.abs(obj.mesh.position[axis]) > state.boundingBox) {
                            obj.mesh.position[axis] = Math.sign(obj.mesh.position[axis]) * state.boundingBox;
                            obj.velocity[axis] *= -1;
                        }
                    });
                } else if (obj.phaseState === 'liquid') {
                    obj.velocity.x += (Math.random()-0.5)*0.006;
                    obj.velocity.y += (Math.random()-0.5)*0.004;
                    obj.velocity.z += (Math.random()-0.5)*0.006;
                    obj.velocity.multiplyScalar(0.985);
                    if (obj.velocity.length() > 0.075) obj.velocity.normalize().multiplyScalar(0.075);
                    obj.mesh.position.add(obj.velocity);
                    obj.mesh.rotation.x += obj.rotVelocity.x;
                    obj.mesh.rotation.y += obj.rotVelocity.y;
                    obj.mesh.rotation.z += obj.rotVelocity.z;

                    const r = Math.sqrt(obj.mesh.position.x*obj.mesh.position.x + obj.mesh.position.z*obj.mesh.position.z);
                    const maxR = 7.2;
                    if (r > maxR) {
                        obj.mesh.position.x *= maxR/r;
                        obj.mesh.position.z *= maxR/r;
                        obj.velocity.x *= -0.65;
                        obj.velocity.z *= -0.65;
                    }
                    if (obj.mesh.position.y < -4.5) { obj.mesh.position.y = -4.5; obj.velocity.y = Math.abs(obj.velocity.y)*0.75; }
                    if (obj.mesh.position.y > 4.0) { obj.mesh.position.y = 4.0; obj.velocity.y = -Math.abs(obj.velocity.y)*0.75; }
                } else {
                    obj.mesh.position.x = obj.basePos.x + Math.sin(t * 3.0 + obj.phase) * 0.055;
                    obj.mesh.position.y = obj.basePos.y + Math.cos(t * 3.2 + obj.phase) * 0.045;
                    obj.mesh.position.z = obj.basePos.z + Math.sin(t * 2.7 + obj.phase) * 0.055;
                    obj.mesh.rotation.y += 0.0015;
                    obj.mesh.rotation.x += 0.0008;
                }
            });
            state.electrons.forEach(el => {
                if (el.phaseState === 'noble_gas_atom') {
                    // Ideal-gas didactic motion: straight trajectory, constant speed, elastic wall bounce.
                    el.mesh.position.add(el.velocity);
                    ['x','y','z'].forEach(axis => {
                        if (Math.abs(el.mesh.position[axis]) > state.boundingBox) {
                            el.mesh.position[axis] = Math.sign(el.mesh.position[axis]) * state.boundingBox;
                            el.velocity[axis] *= -1;
                        }
                    });
                    return;
                }
                el.velocity.x += (Math.random()-0.5)*0.018;
                el.velocity.y += (Math.random()-0.5)*0.018;
                el.velocity.z += (Math.random()-0.5)*0.018;
                if (el.velocity.length() > 0.20) el.velocity.normalize().multiplyScalar(0.20);
                el.mesh.position.add(el.velocity);
                ['x','y','z'].forEach(axis => {
                    if (Math.abs(el.mesh.position[axis]) > state.boundingBox) {
                        el.mesh.position[axis] = Math.sign(el.mesh.position[axis]) * state.boundingBox;
                        el.velocity[axis] *= -0.65;
                    }
                });
            });

            if (!state.isDragging) {
                if (currentScenario.type !== 'none') state.theta -= 0.0015;
                if (typeof isLargeSolidDiatomicScenario === 'function' && isLargeSolidDiatomicScenario()) {
                state.root.scale.setScalar(1.62);
                state.radius = 35.0;
                state.phi = Math.PI / 2.58;
            }
            updateMicro3DCamera(state);
            }
            state.renderer.render(state.scene, state.camera);
        }

        // --- MOLECULAR GEOMETRY AND POLARITY (MOLECULAR COVALENT ONLY) ---
        function getMolecularGeometryData() {
            if (!currentScenario || currentScenario.type !== 'covalent' || !currentScenario.builder) return null;

            const b = currentScenario.builder;
            const isDiatomic = b.periph.length === 1;
            const center = b.center;
            const centralLp = b.expectedLp.center || 0;
            const bondedAtoms = b.periph.length;
            const electronDomains = bondedAtoms + centralLp;

            let electronGeometry = 'linear';
            let molecularGeometry = 'linear';
            let angle = '180';
            let angleText = '180°';

            if (isDiatomic) {
                electronGeometry = 'linear';
                molecularGeometry = 'linear';
                angle = '180';
                angleText = '180°';
            } else if (electronDomains === 2) {
                electronGeometry = 'linear';
                molecularGeometry = 'linear';
                angle = '180';
                angleText = '180°';
            } else if (electronDomains === 3 && centralLp === 0) {
                electronGeometry = 'plano_triangular';
                molecularGeometry = 'plano_triangular';
                angle = '120';
                angleText = '120°';
            } else if (electronDomains === 3 && centralLp === 1) {
                electronGeometry = 'plano_triangular';
                molecularGeometry = 'angular';
                angle = 'menor120';
                angleText = '< 120°';
            } else if (electronDomains === 4 && centralLp === 0) {
                electronGeometry = 'tetraedrica';
                molecularGeometry = 'tetraedrica';
                angle = '109_5';
                angleText = '109.5°';
            } else if (electronDomains === 4 && centralLp === 1) {
                electronGeometry = 'tetraedrica';
                molecularGeometry = 'piramide_triangular';
                angle = 'aprox107';
                angleText = '≈ 107°';
            } else if (electronDomains === 4 && centralLp === 2) {
                electronGeometry = 'tetraedrica';
                molecularGeometry = 'angular';
                angle = 'aprox104_5';
                angleText = '≈ 104.5°';
            }

            const allSamePeripheral = b.periph.every(sym => sym === b.periph[0]);
            let individualBondsPolar = false;

            b.periph.forEach(sym => {
                if (isBondConsideredPolar(center, sym)) individualBondsPolar = true;
            });

            let moleculePolar = false;
            if (isDiatomic) {
                moleculePolar = individualBondsPolar;
            } else if (!individualBondsPolar) {
                moleculePolar = false;
            } else if (centralLp > 0) {
                moleculePolar = true;
            } else if ((molecularGeometry === 'linear' || molecularGeometry === 'plano_triangular' || molecularGeometry === 'tetraedrica') && allSamePeripheral) {
                moleculePolar = false;
            } else {
                moleculePolar = true;
            }

            const formulaPolarityOverrides = {
                CO2: { bonds: true, molecule: false },
                CS2: { bonds: true, molecule: false },
                H2O: { bonds: true, molecule: true },
                H2S: { bonds: true, molecule: true },
                SF2: { bonds: true, molecule: true },
                OF2: { bonds: true, molecule: true },
                OCl2: { bonds: true, molecule: true },
                SCl2: { bonds: true, molecule: true },
                NH3: { bonds: true, molecule: true },
                NF3: { bonds: true, molecule: true },
                NCl3: { bonds: true, molecule: true },
                NBr3: { bonds: true, molecule: true },
                NI3: { bonds: true, molecule: true },
                PH3: { bonds: true, molecule: true },
                PF3: { bonds: true, molecule: true },
                PCl3: { bonds: true, molecule: true },
                PBr3: { bonds: true, molecule: true },
                PI3: { bonds: true, molecule: true },
                CH4: { bonds: true, molecule: false },
                CF4: { bonds: true, molecule: false },
                CCl4: { bonds: true, molecule: false },
                CBr4: { bonds: true, molecule: false },
                CI4: { bonds: true, molecule: false },
                SiH4: { bonds: true, molecule: false },
                SiF4: { bonds: true, molecule: false },
                SiCl4: { bonds: true, molecule: false },
                SiBr4: { bonds: true, molecule: false },
                SiI4: { bonds: true, molecule: false }
            };
            if (formulaPolarityOverrides[currentScenario.form]) {
                individualBondsPolar = formulaPolarityOverrides[currentScenario.form].bonds;
                moleculePolar = formulaPolarityOverrides[currentScenario.form].molecule;
            }

            // phosphine: trigonal pyramid with a small but nonzero experimental dipole moment.
            if (currentScenario.form === 'PH3') {
                individualBondsPolar = true;
                moleculePolar = true;
            }

            return {
                center,
                expectedFocus: isDiatomic ? 'any' : center,
                isDiatomic,
                bondedAtoms,
                centralLp,
                electronDomains,
                electronGeometry,
                geometry: molecularGeometry,
                molecularGeometry,
                angle,
                angleText,
                individualBondsPolar,
                moleculePolar
            };
        }

        function getElectronegativityPolarityInfoHTML(data = null) {
            if (!currentScenario || currentScenario.type !== 'covalent' || !currentScenario.builder) return '';

                .filter(sym => elementsDB[sym] && elementsDB[sym].type === 'nonmetal');
            const rows = symbols.map(sym => {
                const en = electronegativityDB[sym];
                return `<b>${sym}</b>: χ(${sym})=${en?.toFixed(2) ?? '—'}`;
            });
            if (!rows.length) return '';
            return `<br><br><b>Pauling electronegativities of the involved nonmetals:</b><br>${rows.join('; ')}`;
        }

        function getElectronegativityShortHintHTML(data = null) {
            return getElectronegativityPolarityInfoHTML(data).replace('<br><br>', '');

        function checkMolecularPolarity() {
            const data = getMolecularGeometryData();
            if (!data) {
                stepPhysicalProperties();
                return;
            }

            const bondPolarity = document.getElementById('bondPolarity').value;
            const moleculePolarity = document.getElementById('moleculePolarity').value;

            currentStepAttempts++;
            inputArea.innerHTML = '';

            const expectedMol = data.moleculePolar ? 'polar' : 'nonpolar';
            const userBondText = bondPolarity === 'yes' ? 'polar bonds' : 'nonpolar bonds';
            const userMolText = moleculePolarity === 'polar' ? 'polar molecule' : 'nonpolar molecule';
            addUserMessage(`Polarity: ${userBondText}; ${userMolText}.`);

            const prettyShape = {
                linear: 'linear', angular: 'angular', plano_triangular: 'trigonal planar',

        // --- INTERACTIONS BETWEEN PARTICLES ---
        function getParticleAttractionData() {
            const type = currentScenario.type;
            const labels = {
                london: 'London dispersion forces',
                dipole: 'Dipole-dipole forces',
                hydrogen: 'Hydrogen bonds',
                ion_ion: 'Ion-ion electrostatic attraction',
                metallic: 'Electrostatic attraction between cations and delocalized e⁻',
                covalent_network: 'Covalent bonds in the network'
            };
            const intensityLabels = {
                muy_debil: 'Very weak', debil: 'Weak', media: 'Intermediate', fuerte: 'Strong', muy_fuerte: 'Very strong'
            };
            let expected = [];
            let intensity = 'debil';
            let explanation = '';
            let mainConcept = '';
            if (type === 'covalent') {
                const g = getMolecularGeometryData();
                expected = ['london'];
                intensity = 'muy_debil';
                mainConcept = 'Intermolecular forces';
                explanation = 'In molecular covalent substances, the particles are independent molecules. Intermolecular forces act between them.';
                if (g && g.moleculePolar) {
                    expected.push('dipole');
                    intensity = 'debil';
                    if (currentScenario.form === 'PH3') {
                        explanation += ' In phosphine, molecular polarity is weak but not zero; therefore, in addition to London forces, dipole-dipole forces are included. Hydrogen bonds are not included because H is not bonded to N, O, or F.';
                    } else {
                        explanation += ' Because the molecule is polar, dipole-dipole forces appear in addition to London forces.';
                    }
                } else {
                    explanation += ' In this case, the only subtype present is London dispersion.';
                }
                const b = currentScenario.builder;
                const hasHBond = b && b.periph.some(sym => (b.center === 'H' && ['N', 'O', 'F'].includes(sym)) || (sym === 'H' && ['N', 'O', 'F'].includes(b.center)));
                if (hasHBond) {
                    expected.push('hydrogen');
                    intensity = 'media';
                    explanation += ' In addition, because H–N, H–O, or H–F bonds exist, hydrogen bonds also appear. Among intermolecular forces, hydrogen bonds are relatively strong or intermediate in strength; however, they are still much weaker than network covalent bonds, ionic lattices, or metallic bonding.';
                }
            } else if (type === 'ionic') {
                expected = ['ion_ion']; intensity = 'fuerte'; mainConcept = 'Electrostatic attraction between ions';
                explanation = 'In ionic compounds, the particles are positive and negative ions arranged in a lattice. Ion-ion electrostatic attraction is strong as a general didactic rule.';
            } else if (type === 'metallic') {
                expected = ['metallic']; intensity = 'fuerte'; mainConcept = 'Electrostatic attraction between cations and delocalized e⁻';
                explanation = 'In metallic substances, metal cations are held together by a cloud of delocalized electrons. On this general scale, this is considered a strong interaction, although some specific metals may show very resistant interactions.';
            } else if (type === 'covalent_atomic') {
                expected = ['covalent_network']; intensity = 'muy_fuerte'; mainConcept = 'Covalent bonds in the network';
                explanation = 'In atomic covalent substances there are no independent molecules: the whole lattice is held together by very strong covalent bonds.';
            } else if (type === 'none') {
                expected = ['london']; intensity = 'muy_debil'; mainConcept = 'London dispersion forces';
                explanation = 'In noble gases, the particles are isolated atoms. They do not form molecules or bonds; only very weak London dispersion forces appear. Although they are nonpolar, their solubility in nonpolar solvents is usually very low and increases down the group: He < Ne < Ar < Kr < Xe.';
            }
            return { expected, intensity, labels, intensityLabels, explanation, mainConcept };
        }

        function getInteractionStrengthScaleNote() {
            return `<div class="mt-1 p-1.5 bg-amber-50 border border-amber-200 rounded text-slate-700 text-sm leading-snug">
                <b class="text-red-600 font-bold">Note on strength:</b> this scale is a general didactic rule.
                In the simulator, both <b>ionic interaction</b>
                and the <b>electrostatic attraction between cations and delocalized e⁻</b> are considered <b>strong</b>.
                Only <b>network covalent bonds</b> are considered <b>very strong</b>.
                There may be exceptions depending on the specific substance.
            </div>`;
        }
        function stepParticleAttractions(isRetry = false, prev = {}) {
            if (!isRetry) currentStepAttempts = 0;
            const data = getParticleAttractionData();
            safeSetTimeout(() => {
                if (!isRetry) {
                    addTutorMessage(`Before deducing the physical properties, identify which <b class="text-red-600 font-bold">interactions between particles</b> act in this substance and what their predominant strength is.${getInteractionStrengthScaleNote()}`);

                const molecularBlock = `

        function checkParticleAttractions() {
            const data = getParticleAttractionData();
            const selected = Array.from(document.querySelectorAll('.attractionCheck:checked')).map(el => el.value).sort();
            const intensity = document.getElementById('attractionIntensity').value;
            if (!selected.length || !intensity) {
                addTutorMessage('Please, marca al menos una interaction andlect la strength before checking.');
                return;
            }
            currentStepAttempts++;
            inputArea.innerHTML = '';
            const selectedText = selected.map(k => data.labels[k]).join(', ');
            addUserMessage(`Interactions: ${selectedText}. Strength: ${data.intensityLabels[intensity]}.`);
            const expectedSorted = [...data.expected].sort();
            const okForces = selected.length === expectedSorted.length && selected.every((v, i) => v === expectedSorted[i]);
            const okIntensity = intensity === data.intensity;
            safeSetTimeout(() => {
                if (okForces && okIntensity) {
                    addTutorMessage(`<b class="text-red-600 font-bold">Correct!</b> ${data.explanation}${getInteractionStrengthScaleNote()}`);
                    showContinueButton('stepPhysicalProperties()', 'Continue to Physical Properties');
                } else if (currentStepAttempts >= 3) {
                    const expectedText = expectedSorted.map(k => data.labels[k]).join(', ');
                    addTutorMessage(`You have used all 3 attempts. The correct interactions are: <b class="text-red-600 font-bold">${expectedText}</b>. Strength predominant: <b class="text-red-600 font-bold">${data.intensityLabels[data.intensity]}</b>.<br><br>${data.explanation}${getInteractionStrengthScaleNote()}`);
                    showContinueButton('stepPhysicalProperties()', 'Continue to Physical Properties');
                } else {
                    let hint = 'First think about which particles exist and then whether those particles are polar or not.';
                    if (currentScenario.type === 'covalent') hint = 'All molecules have London forces. Then assess whether, because of their polarity, an additional stronger interaction appears.';
                    if (currentScenario.type === 'ionic') hint = 'Here there are no independent molecules, but a lattice of oppositely charged ions.';
                    if (currentScenario.type === 'metallic') hint = 'Metal cohesion does not depend on molecules, but on cations and delocalized electrons.';
                    if (currentScenario.type === 'covalent_atomic') hint = 'Here we are not talking about molecules, but about a continuous lattice of covalent bonds.';
                    addTutorMessage(`Not exactly.<br><br><b>Hint:</b> ${hint}`);
                    stepParticleAttractions(true, { forces: selected, intensity });
                }
            }, 800);
        }

        function isPolarMolecular(sc) {
            const isHomo = sc.e1 === sc.e2;
            const nonpolarMolecules = ['H2', 'N2', 'O2', 'F2', 'Cl2', 'Br2', 'I2', 'CH4', 'CF4', 'CCl4', 'CBr4', 'CI4', 'SiH4', 'SiF4', 'SiCl4', 'SiBr4', 'SiI4', 'CO2', 'CS2'];
            return !isHomo && !nonpolarMolecules.includes(sc.form);
        }

        function getExpectedPropertiesQualitative(sc) {
            const type = sc.type;
            let state = 'Solid'; 
            let qualMelting = 'High';
            let qualBoiling = 'High';
            let condS = 'Insulator'; 
            let condL = 'Insulator';
            let solWater = 'insoluble';
            let solNonpolar = 'insoluble';
            let tough = 'fragil';
            let duct = 'zero';
            let hard = 'duro';
            let therm = 'mala';
            let optic = 'vitreo';

            if (type === 'none') { 
                state = 'Gas';
                qualMelting = 'Very low';
                qualBoiling = 'Very low';
                condS = 'aislante';
                condL = 'aislante';
                solWater = 'insoluble';
                solNonpolar = 'insoluble';
                tough = 'no_aplica';
                text = ''; // Declaracion segura para prevenir ReferenceError
                duct = 'no_aplica';
                hard = 'no_aplica';
                therm = 'mala';
                optic = 'transparente_incoloro';
            } else if (type === 'metallic') { 
                state = 'Solid'; 
                qualMelting = 'High';
                qualBoiling = 'High';
                condS = 'conductor';
                condL = 'conductor';
                solWater = (['Li', 'Na', 'K', 'Rb', 'Cs', 'Ca', 'Sr', 'Ba'].includes(sc.e1)) ? 'reacts' : 'insoluble';
                solNonpolar = 'insoluble';
                tough = 'tenaz';
                duct = 'alta';
                hard = 'variable';
                therm = 'excelente';
                optic = 'metalico';
            } else if (type === 'covalent_atomic') { 
                state = 'Solid'; 
                qualMelting = 'Very high';
                qualBoiling = 'Very high';
                condS = 'aislante';
                condL = 'aislante';
                solWater = 'insoluble';
                solNonpolar = 'insoluble';
                tough = 'fragil';
                duct = 'zero';
                hard = 'muy_duro';
                therm = 'excepcional';
                optic = 'adamantino';
            } else if (type === 'ionic') { 
                state = 'Solid'; 
                qualMelting = 'High';
                qualBoiling = 'High';
                condS = 'aislante';
                condL = 'conductor';
                solWater = 'soluble';
                solNonpolar = 'insoluble';
                tough = 'fragil';
                text = '';
                duct = 'zero';
                hard = 'duro';
                therm = 'mala';
                optic = 'vitreo';
            } else if (type === 'covalent') { 
                state = (['I2', 'P4', 'S8'].includes(sc.form)) ? 'Solid' : (['H2O', 'Br2'].includes(sc.form)) ? 'Liquid' : 'Gas';
                qualMelting = 'Low';
                qualBoiling = 'Low';
                condS = 'aislante';
                condL = 'aislante';
                if (sc.form === 'PH3') {
                    // phosphine: polar weak, gas at room temperature,
                    // slightly soluble in water and with affinity for organic/nonpolar solvents.
                    solWater = 'poco_soluble';
                    solNonpolar = 'soluble';
                } else if (isPolarMolecular(sc)) {
                    solWater = 'soluble';
                    solNonpolar = 'insoluble';
                } else {
                    solWater = 'insoluble';
                    solNonpolar = 'soluble';
                }
                tough = (state === 'Gas' || state === 'Liquid') ? 'no_aplica' : 'fragil';
                duct = (state === 'Gas' || state === 'Liquid') ? 'no_aplica' : 'zero';
                hard = (state === 'Gas' || state === 'Liquid') ? 'no_aplica' : 'blando';
                therm = 'mala';
                optic = 'transparente_mate';
            }

            return { state, qualMelting, qualBoiling, condS, condL, solWater, solNonpolar, tough, duct, hard, therm, optic };
        }

        function checkPhysicalProperties() {
            currentStepAttempts++;
            const type = currentScenario.type;
            const expectedQual = getExpectedPropertiesQualitative(currentScenario);

            let expectedValueState = '';
            let expectedValueMB = '';
            let expectedValueCondS = '';
            let expectedValueCondL = (type === 'ionic' || type === 'metallic') ? 'conductor' : 'aislante';
            
            if (type === 'none') { expectedValueState = 'gases'; expectedValueMB = 'muy_bajos'; expectedValueCondS = 'aislante'; }
            else if (type === 'covalent') { expectedValueState = 'sol_liq_gas'; expectedValueMB = 'bajos'; expectedValueCondS = 'aislante'; }
            else if (type === 'ionic') { expectedValueState = 'solids'; expectedValueMB = 'altos'; expectedValueCondS = 'aislante'; }
            else if (type === 'metallic') { expectedValueState = 'solids'; expectedValueMB = 'altos'; expectedValueCondS = 'conductor'; }
            else if (type === 'covalent_atomic') { expectedValueState = 'solids'; expectedValueMB = 'muy_altos'; expectedValueCondS = 'aislante'; }

            // Manejo de solubilidad metallic para validacion general
            let expectedValueSolWater = expectedQual.solWater;
            if (type === 'metallic') expectedValueSolWater = 'reacts'; 

            const expectedValueTough = expectedQual.tough;
            const expectedValueDuct = expectedQual.duct;
            const expectedValueHard = expectedQual.hard;
            const expectedValueTherm = expectedQual.therm;
            const expectedValueOptic = expectedQual.optic;

            const stateSelect = document.getElementById('prop_state');
            const mbSelect = document.getElementById('prop_melting_boiling');
            const condSSelect = document.getElementById('prop_condS');
            const condLSelect = document.getElementById('prop_condL');
            const solWaterSelect = document.getElementById('prop_sol_water');
            const solNonpolarSelect = document.getElementById('prop_sol_nonpolar');
            const toughSelect = document.getElementById('prop_tough');
            const ductSelect = document.getElementById('prop_duct');
            const hardSelect = document.getElementById('prop_hard');
            const thermSelect = document.getElementById('prop_therm');
            const opticSelect = document.getElementById('prop_optic');
            
            const state = stateSelect ? stateSelect.value : '';
            const mb = mbSelect ? mbSelect.value : '';
            const condS = condSSelect ? condSSelect.value : '';
            const condL = condLSelect ? condLSelect.value : '';
            const solW = solWaterSelect ? solWaterSelect.value : '';
            const solA = solNonpolarSelect ? solNonpolarSelect.value : '';
            const tough = toughSelect ? toughSelect.value : '';
            const duct = ductSelect ? ductSelect.value : '';
            const hard = hardSelect ? hardSelect.value : '';
            const therm = thermSelect ? thermSelect.value : '';
            const optic = opticSelect ? opticSelect.value : '';
            
            if (!state || !mb || !condS || !condL || !solW || !solA || !tough || !duct || !hard || !therm || !optic) {
                addTutorMessage("Please select an answer in every drop-down menu before checkinging.");
                return;
            }

            inputArea.innerHTML = '';
            addUserMessage("Checking the 11 predicted properties...");

            let errors = [];
            
            const validateField = (selectEl, val, expected, name) => {
                if (!selectEl) return;
                if (val !== expected) {
                    errors.push(name);
                    selectEl.value = ''; // Reset only what is wrong
                    selectEl.classList.add('border-red-400', 'bg-red-50');
                    selectEl.classList.remove('border-emerald-400', 'bg-emerald-50', 'text-emerald-800', 'font-semibold', 'border-slate-300');
                } else {
                    selectEl.disabled = true; // Lock and mark in green what is correct
                    selectEl.classList.remove('border-red-400', 'bg-red-50', 'text-slate-800', 'border-slate-300');
                    selectEl.classList.add('border-emerald-400', 'bg-emerald-50', 'text-emerald-800', 'font-semibold');
                }
            };

            validateField(stateSelect, state, expectedValueState, "Physical state");
            validateField(mbSelect, mb, expectedValueMB, "Melting/boiling points");
            validateField(condSSelect, condS, expectedValueCondS, "Electrical conductivity (solid)");
            validateField(condLSelect, condL, expectedValueCondL, "Electrical conductivity (molten or aqueous solution)");
            validateField(solWaterSelect, solW, expectedValueSolWater, "Solubility in WATER");
            validateField(solNonpolarSelect, solA, expectedQual.solNonpolar, "Solubility in NONPOLAR SOLVENTS");

            if (sc.type === 'ionic') {
                const a1 = elementsDB[sc.e1];
                const a2 = elementsDB[sc.e2];
                const isO = sc.e2 === 'O';
                const isN = sc.e2 === 'N';
                const isH = sc.e2 === 'H';
                
                const baseM = isO ? 2400 : (isN ? 1800 : (isH ? 650 : 780));
                const variation = (a1.z * 4) + (a2.z * 2);
                const exactM = baseM - variation; 
                const exactB = exactM + (isO || isN ? 850 : 620);
                let solText = (isO || isN) ? 'Insoluble / Reacts' : (isH ? 'Reacts violently' : 'Very soluble (aprox. 400 g/L)');
                
                return {
                    m: `${exactM} ºC`,
                    b: `${exactB} ºC`,
                    d: `${1800 + variation * 15} kg/m³`,
                    sol: solText
                };
            }

            return { m: 'N/A', b: 'N/A', d: 'N/A', sol: 'Variable' };
        }

                            <div class="mt-8 mb-1 flex justify-center w-full">
                                <div class="bg-white p-3 shadow-lg border border-slate-200 rounded-xl max-w-[340px] w-full relative group">
                                    <div class="absolute -top-3 -left-3 w-8 h-8 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fas fa-camera text-slate-300 text-2xl"></i></div>
                                    <div class="bg-slate-100 h-56 w-full flex items-center justify-center overflow-hidden rounded-lg border border-slate-200">
                                        ${photoBlock}
                                    </div>
                                    <div class="mt-4 mb-1 text-center text-lg text-slate-600 font-serif italic">
                                        Real or representative image / macroscopic appearance (${formatChemicalFormulaHTML(currentScenario.form)})
                                    </div>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                `;

                addTutorMessage("I have generated the complete report with the properties sheet on the work board. Review it. When you are ready, click \"New Pair\" above for another challenge.");
            }, 1000);
        }

        // --- DRAG & DROP BUILDER HANDLERS AND UTILITIES ---
        window.handleDragStart = function(ev, id) {
            ev.dataTransfer.setData("text/plain", id);
        };
        window.allowDrop = function(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.add('drag-over');
        };
        window.dragLeave = function(ev) {
            ev.currentTarget.classList.remove('drag-over');
        };
        window.handleDropEvent = function(ev, targetPos) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            
            const draggedId = ev.dataTransfer.getData("text/plain");
            if (!draggedId) return;

            const atomObj = builderState.allAtoms.find(a => a.id === draggedId);
            if (!atomObj) return;

            let oldPos = null;
            builderState.inventory = builderState.inventory.filter(a => a.id !== draggedId);
            for (let key of ['center', 0, 1, 2, 3]) {
                if (builderState.placed[key] && builderState.placed[key].id === draggedId) {
                    oldPos = key;
                    builderState.placed[key] = null;
                    break;
                }
            }

            if (oldPos !== null && oldPos !== 'center') builderState.bonds[oldPos] = 0; 
            if (oldPos === 'center') builderState.bonds = [0,0,0,0];

            if (targetPos === 'inventory') {
                builderState.inventory.push(atomObj);
            } else {
                const existing = builderState.placed[targetPos];
                if (existing) builderState.inventory.push(existing);
                builderState.placed[targetPos] = atomObj;
            }
            renderBuilderUI();
        };

        window.cycleBond = function(index) {
            if (!builderState.placed['center'] || !builderState.placed[index]) return; 
            builderState.bonds[index] = (builderState.bonds[index] + 1) % 4; 
            renderBuilderUI();
        };

        window.cycleLp = function(pos) {
            let maxLp = 0;
            const diatomicCap = getDiatomicLonePairCap(pos);
            if (diatomicCap !== null) {
                maxLp = diatomicCap;
            } else if (pos === 'center') {
                const occupiedDirs = [0, 1, 2, 3].reduce((acc, idx) => acc + (builderState.placed[idx] ? 1 : 0), 0);
                maxLp = Math.max(0, 4 - occupiedDirs);
            } else {
                maxLp = builderState.placed[pos] ? 3 : 0;
            }
            builderState.lp[pos] = (builderState.lp[pos] + 1) % (maxLp + 1);
            renderBuilderUI();
        };
        
        window.resetLewisBoard = function() {
            const b = currentScenario.builder;
            builderState.allAtoms = [];
            let aId = 0;
            builderState.allAtoms.push({ id: `a${aId++}`, sym: b.center });
            b.periph.forEach(sym => { builderState.allAtoms.push({ id: `a${aId++}`, sym: sym }); });
            
            builderState.inventory = [...builderState.allAtoms];
            builderState.placed = { center: null, 0: null, 1: null, 2: null, 3: null };
            builderState.bonds = [0, 0, 0, 0];
            builderState.lp = { center: 0, 0: 0, 1: 0, 2: 0, 3: 0 };
            renderBuilderUI();
        };

        // --- INICIALIZAR AL CARGAR ---
        window.onload = () => {
            fillScenarioSelector();
            initSimulation();
        };
    </script>
</body>
</html
